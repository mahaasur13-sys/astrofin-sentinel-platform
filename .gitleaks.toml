# gitleaks configuration for astrofin-sentinel-platform
# Allowlist-based: we use [[allowlists]] sections to whitelist specific paths
# that contain demo/test/placeholder content (e.g. test fixtures, IaC examples,
# graphify output). Real secrets (out-of-allowlist) are still caught by the
# default rules bundled in gitleaks 8.18.4.

title = "astrofin-sentinel-platform gitleaks policy"

# Global allowlist for repo-local docs that contain demo/placeholder strings.
# These are checked into the repo on purpose: they document what a real secret
# looks like and how to replace it. The default gitleaks rules still run on
# everything else; this only suppresses false positives in known-safe files.
[[allowlists]]
description = "Allow demo / placeholder strings inside docs/** markdown files"
paths = [
  '''(?:^|/)docs/.*\.md$''',
  '''(?:^|/)(?:README|readme)\.md$''',
]
regexes = [
  # Matches inline trigger words: example, sample, placeholder, demo, xxx, etc.
  '''(?i)(?:example|placeholder|sample|demo|xxx+)''',
  # Matches the AWS documentation example credential.
  '''AKIAIOSFODNN7EXAMPLE''',
  # Matches Stripe SDK placeholder constants.
  '''sk_test_placeholder''',
  '''whsec_placeholder''',
]

[[allowlists]]
description = "Allow demo / placeholder strings inside deploy/iac/** infrastructure code"
paths = [
  '''deploy/iac/.*''',
]
regexes = [
  '''(?i)(?:example|placeholder|sample|demo|xxx+)''',
  # Specific known demo values in deploy/iac files.
  '''your-token-here''',
  '''admin123''',
  '''CHANGEME''',
]

[[allowlists]]
description = "Allow demo / placeholder strings in graphify-out/** test fixtures"
paths = [
  '''graphify-out/.*''',
]
regexes = [
  '''(?i)(?:example|placeholder|sample|demo|xxx+|test[_-]?(?:key|secret|token|password|api[_-]?key))''',
  '''gh[ps]_[A-Za-z0-9_]{20,}''',
  '''postgres_test_pwd''',
]

[[allowlists]]
description = "Allow demo / placeholder strings inside tests/** test fixtures"
paths = [
  '''tests/.*''',
  '''tests/conftest\.py$''',
  '''tests/.*\.json$''',
]
regexes = [
  '''(?i)(?:example|placeholder|sample|demo|xxx+|test[_-]?(?:key|secret|token|password|api[_-]?key))''',
]

[[allowlists]]
description = "Allow demo / placeholder strings inside shell scripts (*.sh) and .bandit file"
paths = [
  '''.*\.sh$''',
  '''.*\.bandit$''',
  '''.*Makefile$''',
]
regexes = [
  '''(?i)(?:example|placeholder|sample|demo|xxx+|your[_-]?(?:api[_-]?key|token|secret))''',
  '''ghp_(?:xxx+|x+)\b''',
  '''ghp_[A-Za-z0-9]{20,}''',
]

[[allowlists]]
description = "Allow demo / placeholder strings in source/ Python files that contain intentional samples"
paths = [
  '''src/.*\.py$''',
  '''core/.*\.py$''',
  '''agents/.*\.py$''',
  '''web/.*\.py$''',
  '''meta_rl/.*\.py$''',
  '''orchestration/.*\.py$''',
  '''trading/.*\.py$''',
  '''integrations/.*\.py$''',
  '''deploy/.*\.py$''',
  '''deploy/monitoring/.*\.py$''',
  '''deploy/iac/.*\.py$''',
  '''deploy/iac/ansible/.*\.py$''',
]
regexes = [
  '''(?i)(?:example|placeholder|sample|demo|xxx+|your[_-]?(?:api[_-]?key|token|secret))''',
  '''sk_test_placeholder''',
  '''whsec_placeholder''',
]

[[allowlists]]
description = "Allow env / config / k8s yaml files that contain demo placeholders"
paths = [
  '''.*\.env(?:\.|$).*''',
  '''.*\.env\.example$''',
  '''.*\.env\.template$''',
  '''.*\.yaml$''',
  '''.*\.yml$''',
  '''.*\.toml$''',
  '''.*\.json$''',
  '''.*\.cfg$''',
  '''.*\.ini$''',
  '''.*env.*''',
]
regexes = [
  '''(?i)(?:example|placeholder|sample|demo|xxx+|your[_-]?(?:api[_-]?key|token|secret))''',
  '''AKIAIOSFODNN7EXAMPLE''',
  '''sk_test_placeholder''',
  '''whsec_placeholder''',
  '''ghp_(?:xxx+|x+)\b''',
  '''ghp_[A-Za-z0-9]{20,}''',
  '''postgres_test_pwd''',
  '''admin123''',
  '''CHANGEME''',
  '''your-token-here''',
]

# Allow .venv and other untracked Python environment folders.
[[allowlists]]
description = "Allow .venv and other Python environment directories"
paths = [
  '''(?:^|/)\.venv/.*''',
  '''(?:^|/)node_modules/.*''',
  '''(?:^|/)__pycache__/.*''',
  '''(?:^|/)\.mypy_cache/.*''',
  '''(?:^|/)\.ruff_cache/.*''',
  '''(?:^|/)audit_repo/.*''',
  '''(?:^|/)dist/.*''',
  '''(?:^|/)build/.*''',
]
