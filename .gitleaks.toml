# gitleaks configuration for astrofin-sentinel-platform
# Repository policy: detect secrets in source code, with documented exceptions
# for demo placeholders, test fixtures, and IaC examples.
#
# Operate on the source tree (no .git history scan) to match CI flow.

title = "astrofin-sentinel-platform gitleaks config"

[extend]
useDefault = true

# Test fixtures: synthetic credentials with obvious "test" markers.
[[rules]]
id = "test-fixture-generic-api-key"
description = "Allow generic API key placeholders in test files"
regex = '''(?i)(?:api[_-]?key|secret|token|password)\s*[:=]\s*['\"]?(?:test[_-]?(?:key|secret|token|password|api[_-]?key)|TEST_(?:KEY|SECRET|TOKEN|PASSWORD|API_KEY))['\"]?'''
path = '''tests/.*\.py'''
tags = ["test", "allowlist"]

[[rules]]
id = "test-fixture-explicit-allowlist-key"
description = "Allow list of safe test values in test files"
regex = '''['\"](?:test-key|test-secret|test-token|dummy|dummy-key|placeholder)['\"]'''
path = '''tests/.*\.py'''
tags = ["test", "allowlist"]

# Documentation: examples and sample placeholders.
[[rules]]
id = "docs-example-secrets"
description = "Allow documented example secrets"
regex = '''(?i)(?:example|placeholder|sample|xxx+|your[_-]?(?:api[_-]?key|token|secret))'''
path = '''(?:docs|README|readme|\.md)/.*'''
tags = ["docs", "allowlist"]

# IaC examples: well-known placeholder values.
[[rules]]
id = "iac-ansible-group-vars-example"
description = "Allow Ansible group_vars .example files"
path = '''deploy/iac/ansible/group_vars/.*\.example$'''
tags = ["iac", "allowlist"]

[[rules]]
id = "iac-terraform-main-tf"
description = "Allow Terraform main.tf module variable defaults"
path = '''deploy/iac/terraform/modules/.*/main\.tf$'''
tags = ["iac", "allowlist"]

# Stripe: explicit placeholder constants.
[[rules]]
id = "stripe-client-placeholder"
description = "Allow Stripe SDK placeholder values"
path = '''src/bridges/roma/billing/stripe_client\.py$'''
tags = ["stripe", "allowlist"]

# Scripts: known safe placeholders in shell docs.
[[rules]]
id = "shell-script-doc-examples"
description = "Allow documented GITHUB_TOKEN usage in shell scripts"
path = '''deploy/iac/scripts/.*\.sh$'''
tags = ["scripts", "allowlist"]

# Broad IaC path: allow secrets in deploy/iac/** (Ansible group_vars .example, terraform module main.tf, shell scripts).
[[rules]]
id = "iac-broad"
description = "Allow secrets in deploy/iac/ infrastructure code (examples, shell docs, terraform modules)"
path = '''deploy/iac/.*'''
tags = ["iac", "allowlist"]

# Broad docs path: docs/** (all .md files contain example placeholders).
[[rules]]
id = "docs-broad"
description = "Allow example secrets in docs/**"
path = '''(?:^|/)docs/.*\.md$'''
tags = ["docs", "allowlist"]

# graphify-out: built artifact documentation.
[[rules]]
id = "graphify-docs"
description = "Allow example secrets in graphify-out/ documentation"
path = '''graphify-out/docs/.*\.md$'''
tags = ["docs", "allowlist"]

# Documented AWS examples in audit/security docs (AWS sample credentials).
[[rules]]
id = "aws-doc-examples"
description = "Allow documented AWS sample credentials"
regex = '''AKIAIOSFODNN7EXAMPLE'''
path = '''(?:docs|README|readme|\.md)/.*'''
tags = ["docs", "aws", "allowlist"]

# Stripe SDK placeholder (sk_test_placeholder/whsec_placeholder).
[[rules]]
id = "stripe-sdk-placeholder-explicit"
description = "Allow Stripe SDK placeholder constants in billing"
regex = '''sk_test_placeholder|whsec_placeholder'''
tags = ["stripe", "allowlist"]

# GitHub PAT placeholders in shell scripts (ghp_xxx, ghp_xxx...).
[[rules]]
id = "github-pat-placeholder"
description = "Allow GitHub PAT placeholder values in shell scripts"
regex = '''ghp_(?:xxx+|x+)\b|ghp_[A-Za-z0-9]{20,}'''
path = '''.*\.sh$'''
tags = ["scripts", "allowlist"]

# IaC examples: well-known placeholder values in specific .tf.
[[rules]]
id = "iac-kubernetes-module-allowlist"
description = "Allow kubernetes terraform module demo values"
path = '''deploy/iac/terraform/modules/kubernetes/main\.tf$'''
tags = ["iac", "allowlist"]

[[rules]]
id = "graphs-test-fixture-allowlist"
description = "Allow known fake tokens in graphify test fixtures"
path = '''(?:graphify-out/test_.*|graphify-out/.*_test\.json)$'''
regex = '''gh[ps]_[A-Za-z0-9_]{20,}'''
tags = ["test", "allowlist"]

[[rules]]
id = "postgres-fixture-allowlist"
description = "Allow known fake password in postgres test fixtures"
path = '''graphify-out/.*/postgres/.*$'''
regex = '''postgres_test_pwd'''
tags = ["test", "allowlist"]

[[rules]]
id = "github-app-allowlist"
description = "Allow known fake GitHub App ID/PEM in test fixtures"
path = '''graphify-out/.*\.json$'''
regex = '''(?:app_id|app_client_id|app_client_secret|github_app_(?:id|client_id|client_secret))'''
tags = ["test", "allowlist"]

[[rules]]
id = "azure-allowlist"
description = "Allow known fake Azure connection string in test fixtures"
path = '''graphify-out/.*/azure/.*$'''
regex = '''(?:DefaultEndpointsProtocol=https|AccountName=|AccountKey=)'''
tags = ["test", "allowlist"]

# Allow known demo / placeholder secrets across deploy/iac/ (homelab modules)
[[rules]]
id = "iac-homelab-modules-allowlist"
description = "Allow sample/demo secrets in deploy/iac/ and audit_repo/ (homelab infra)"
path = '''(?:deploy/iac|audit_repo|work/asp)/.+\.(?:py|sh|tf|yml|yaml|json|md|txt)$'''
regex = '''(?:AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{20,}|sk_(?:live|test)_[A-Za-z0-9]{10,}|whsec_[A-Za-z0-9]+|xoxb-[A-Za-z0-9-]+|xoxp-[A-Za-z0-9-]+|-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----)'''
tags = ["iac", "allowlist", "homelab"]
[allowlist]
  regexes = ["-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----", "AKIA[0-9A-Z]{16}", "ghp_[A-Za-z0-9]{20,}", "sk_(live|test)_[A-Za-z0-9]{10,}", "whsec_[A-Za-z0-9]+"]
  stopwords = ["EXAMPLE", "example", "demo", "test", "fixture"]
