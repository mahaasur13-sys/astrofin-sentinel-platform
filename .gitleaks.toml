# gitleaks configuration for astrofin-sentinel-platform
# Purpose: allow only well-known false positives (AWS docs examples, test fixtures).
# Any new rule must come with a justification comment.

title = "AstroFin Sentinel — gitleaks config"

[allowlist]
  description = "Allow test fixtures with well-known/example-only secrets"
  paths = [
    '''tests/test_logging_utils\.py''',
    '''tests/.*/conftest\.py''',
    '''.*\.example$''',
    '''.*\.example\..*$''',
    '''docs/.*''',
  ]

  regexes = [
    '''AKIAIOSFODNN7EXAMPLE''',
    '''AIzaSyA1234567890ABCDEFGH''',
  ]

  stopwords = [
    "EXAMPLE",
    "example",
    "dummy",
    "placeholder",
    "test-key",
    "test-secret",
  ]
