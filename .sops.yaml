# SOPS configuration for AstroFin Sentinel Platform
# See docs/SOPS.md §Key Rotation for full key-rotation policy.
#
# All path_regex entries are anchored (^) to the start of the path so first-match
# routing cannot pick up archive/ tmp-prefixed files into a more permissive
# recipient set.
#
# prod_recipients: YAML anchor (line ~10) — both creation_rules reference it so
# the same recipient pair is reused everywhere. Add new recipients there once and
# both rules pick them up.

.prod_recipients: &prod_recipients
  - age1primaryoperator1qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq
  - age1backupoperator2qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq

creation_rules:
  - path_regex: ^\.env\.prod\.enc\.yaml$
    key_groups:
      - age: *prod_recipients
  - path_regex: ^secrets/.*\.enc\.yaml$
    key_groups:
      - age: *prod_recipients
