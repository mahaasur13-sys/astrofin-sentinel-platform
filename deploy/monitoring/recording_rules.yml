groups:
  # =======================================================================
  # AstroFin Sentinel — SLO Recording Rules
  # Source of truth: docs/slo.md (v1.0) and SLO.md (top-level index)
  # These rules are evaluated by Prometheus and consumed by:
  #   - alert_rules.yml   (for SLOBudgetBurn / HighErrorRate / HighLatency)
  #   - Grafana dashboards
  #   - `astrofin_slo_error_budget_remaining` queries from RUNBOOK.md
  # =======================================================================

  - name: astrofin_slo_recording
    interval: 30s
    rules:

      # ------------------------------------------------------------------
      # SLO-1: API availability
      # SLO:  ≥ 99.5% (top-level) / 99.9% (docs/slo.md detailed)
      # ------------------------------------------------------------------
      - record: astrofin:slo:availability:ratio_5m
        expr: |
          sum(rate(http_requests_total{job=~"astrofin-.*",code!~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job=~"astrofin-.*"}[5m]))

      - record: astrofin:slo:availability:ratio_30d
        expr: |
          sum(rate(http_requests_total{job=~"astrofin-.*",code!~"5.."}[30d]))
          /
          sum(rate(http_requests_total{job=~"astrofin-.*"}[30d]))

      - record: astrofin:slo:availability:error_budget_remaining_30d
        expr: |
          1 - (
            (1 - astrofin:slo:availability:ratio_30d)
            /
            (1 - 0.995)
          )

      # ------------------------------------------------------------------
      # SLO-2: Submission latency p95 (< 500ms target)
      # ------------------------------------------------------------------
      - record: astrofin:slo:latency_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{path="/api/v1/submit"}[5m]))
          )

      - record: astrofin:slo:latency_p95:1h
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{path="/api/v1/submit"}[1h]))
          )

      # ------------------------------------------------------------------
      # SLO-3: Success rate (2xx share of all responses)
      # ------------------------------------------------------------------
      - record: astrofin:slo:success_rate:5m
        expr: |
          sum(rate(http_requests_total{job=~"astrofin-.*",code=~"2xx"}[5m]))
          /
          sum(rate(http_requests_total{job=~"astrofin-.*"}[5m]))

      # ------------------------------------------------------------------
      # SLO-3: Blackbox healthcheck uptime (per docs/slo.md SLO-3)
      # ------------------------------------------------------------------
      - record: astrofin:slo:healthcheck_uptime:ratio_30d
        expr: |
          avg_over_time(probe_success{job="blackbox-web"}[30d])

  - name: astrofin_service_recording
    interval: 30s
    rules:

      # ------------------------------------------------------------------
      # Per-service request rate and error rate (for dashboards + alerts)
      # ------------------------------------------------------------------
      - record: astrofin:service:request_rate:5m
        expr: sum by (service, job) (rate(http_requests_total[5m]))

      - record: astrofin:service:error_rate:5m
        expr: |
          sum by (service, job) (rate(http_requests_total{code=~"5.."}[5m]))
          /
          clamp_min(sum by (service, job) (rate(http_requests_total[5m])), 1e-9)

      # ------------------------------------------------------------------
      # Per-service latency p50 / p95 / p99 (for dashboards)
      # ------------------------------------------------------------------
      - record: astrofin:service:latency_p50:5m
        expr: |
          histogram_quantile(0.50,
            sum by (le, service) (rate(http_request_duration_seconds_bucket[5m])))

      - record: astrofin:service:latency_p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (le, service) (rate(http_request_duration_seconds_bucket[5m])))

      - record: astrofin:service:latency_p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (le, service) (rate(http_request_duration_seconds_bucket[5m])))

      # ------------------------------------------------------------------
      # Service up (1 if scrape succeeded in last 1m, 0 otherwise)
      # ------------------------------------------------------------------
      - record: astrofin:service:up:1m
        expr: avg_over_time(up{job=~"astrofin-.*"}[1m])
