# =============================================================================
# Prometheus — AstroFin Sentinel Platform
# Scrapes the docker-network services.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: astrofin-sentinel

scrape_configs:
  # Web dashboard
  - job_name: 'astrofin-web'
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8050']
        labels:
          service: 'web-dashboard'

  # ML inference API
  - job_name: 'acos-ml-engine'
    metrics_path: /metrics
    static_configs:
      - targets: ['ml-engine:8081']
        labels:
          service: 'ml-inference'

  # Feature pipeline (optional /metrics endpoint)
  - job_name: 'acos-feature-pipeline'
    metrics_path: /metrics
    static_configs:
      - targets: ['feature-pipeline:8090']
        labels:
          service: 'feature-pipeline'
    honor_labels: true

  # GPU worker (only on NVIDIA hosts)
  - job_name: 'roma-gpu-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['gpu-worker:8000']
        labels:
          service: 'gpu-worker'
    # Tolerate absence — profile-gated service
    honor_labels: true

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']