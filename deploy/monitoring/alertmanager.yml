# =============================================================================
# Alertmanager — AstroFin Sentinel Platform
#
# Routing tree:
#   default → slack (#alerts)         (everything)
#   severity=critical → slack + pagerduty + email (24/7 on-call)
#   severity=warning  → slack + email  (business hours only)
#   slo=*             → separate channel #slo-burn
#
# Required secrets (resolve at deploy time via envsubst or sealed-secrets):
#   - SLACK_WEBHOOK_URL       (incoming webhook for #alerts)
#   - SLACK_WEBHOOK_SLO_URL   (incoming webhook for #slo-burn)
#   - PAGERDUTY_ROUTING_KEY   (Events API v2 key)
#   - SMTP_PASSWORD           (for email notifications)
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost:  'smtp.sendgrid.net:587'
  smtp_from:       'alerts@astrofin.example'
  smtp_require_tls: true
  smtp_auth_username: 'apikey'
  smtp_auth_password: 'PLACEHOLDER_SMTP'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'slack-default'
  group_by: ['alertname', 'namespace', 'service']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  routes:
    # ------------------------------------------------------------------
    # SLO-burn alerts — отдельный канал + immediate escalation
    # ------------------------------------------------------------------
    - matchers:
        - slo =~ ".*"
      receiver: 'slack-slo'
      group_wait: 10s
      repeat_interval: 1h
      continue: true
    # ------------------------------------------------------------------
    # Critical — page on-call
    # ------------------------------------------------------------------
    - matchers:
        - severity = "critical"
      receiver: 'pagerduty-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: true
    # ------------------------------------------------------------------
    # Warning — email + slack (без pagerduty)
    # ------------------------------------------------------------------
    - matchers:
        - severity = "warning"
      receiver: 'email-warning'
      group_wait: 1m
      repeat_interval: 6h

receivers:
  - name: 'slack-default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER/PLACEHOLDER/PLACEHOLDER'
        channel: '#alerts'
        title:   'AstroFin Alert'
        text: |
          {{ range .Alerts }}
          *[{{ .Labels.severity | default "info" }}]* {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ if .Annotations.runbook_url }}📖 Runbook: {{ .Annotations.runbook_url }}{{ end }}
          {{ end }}

  - name: 'slack-slo'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER/PLACEHOLDER/PLACEHOLDER'
        channel: '#slo-burn'
        title:   'AstroFin SLO burn'
        text: |
          {{ range .Alerts }}
          :fire: *{{ .Labels.slo }}* — {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: 'PLACEHOLDER_PAGERDUTY_ROUTING_KEY'
        severity:    '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          cluster:  '{{ .CommonLabels.cluster }}'
          namespace: '{{ .CommonLabels.namespace }}'
          runbook:  '{{ .CommonAnnotations.runbook_url }}'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER/PLACEHOLDER/PLACEHOLDER'
        channel: '#alerts-critical'
        title:   ':rotating_light: PAGER: AstroFin Critical'

  - name: 'email-warning'
    email_configs:
      - to: 'oncall@astrofin.example'
        send_resolved: true
        headers:
          Subject: '[AstroFin][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        html: |
          <h2>{{ .CommonAnnotations.summary }}</h2>
          <p>{{ .CommonAnnotations.description }}</p>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          {{ if .CommonAnnotations.runbook_url }}
          <p><a href="{{ .CommonAnnotations.runbook_url }}">📖 Open runbook</a></p>
          {{ end }}

# ----------------------------------------------------------------------
# Inhibition — если горит SLO, подавляем одиночные компонентные алерты
# ----------------------------------------------------------------------
inhibit_rules:
  - source_matchers:
      - slo =~ ".*"
    target_matchers:
      - severity = "warning"
      - alertname =~ "HealthcheckSlow|ReadinessFailing|PodRestartingFrequently"
    equal: ['service', 'namespace']
  - source_matchers:
      - alertname = "PodCrashLooping"
    target_matchers:
      - alertname = "HealthcheckFailing"
    equal: ['pod', 'namespace']


# =============================================================================
# ServiceMonitor / PodMonitor hint (for Prometheus Operator)
# =============================================================================
# Если кластер использует Prometheus Operator, эти CRD'ы подхватываются
# автоматически. Если используется vanilla Prometheus — достаточно scrape_configs
# в prometheus.yml.
#
# Пример PodMonitor (для документации):
#
# apiVersion: monitoring.coreos.com/v1
# kind: PodMonitor
# metadata:
#   name: astrofin-sentinel-web
#   namespace: astrofin-sentinel
# spec:
#   selector:
#     matchLabels:
#       app.kubernetes.io/name: astrofin-sentinel-web
#   podMetricsEndpoints:
#     - port: http
#       path: /metrics
#       interval: 30s