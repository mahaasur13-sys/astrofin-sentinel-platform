groups:
  # =======================================================================
  # AstroFin Sentinel — Alert Rules
  # Source of truth: docs/slo.md and SLO.md
  # All thresholds come from the SLO document. Do not edit numbers
  # here without updating docs/slo.md.
  # =======================================================================

  - name: astrofin_slo
    interval: 30s
    rules:

      # ------------------------------------------------------------------
      # SLOBudgetBurn — fires when the 30-day error budget is being
      # consumed faster than allowed. Two windows per docs/slo.md:
      #   - 1h fast burn (14.4×) → SEV-2 page
      #   - 6h slow burn (6×)    → Slack warning
      # ------------------------------------------------------------------
      - alert: SLOAvailabilityBurnFast
        expr: |
          (1 - astrofin:slo:availability:ratio_5m)
          >
          (1 - astrofin:slo:availability:ratio_30d) * 14.4
        for: 2m
        labels:
          severity: critical
          slo: availability
          burn_window: 1h
        annotations:
          summary: "SLO-1 availability: fast burn detected"
          description: |
            API availability is 14.4× worse than the 30-day baseline.
            At this rate the 30-day error budget will be exhausted in ~2 days.
            See RUNBOOK.md → "SLOAvailabilityBurnFast".
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#sloavailabilityburnfast

      - alert: SLOAvailabilityBurnSlow
        expr: |
          (1 - astrofin:slo:availability:ratio_30d)
          >
          (1 - 0.995) * 0.5
        for: 5m
        labels:
          severity: warning
          slo: availability
          burn_window: 30d
        annotations:
          summary: "SLO-1 availability: >50% of monthly error budget consumed"
          description: |
            More than 50% of the 30-day error budget has been used.
            New non-critical releases are frozen (see SLO.md → Error budget policy).
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#sloavailabilityburnslow

      # ------------------------------------------------------------------
      # Latency budget burn — SLO-2: p95 < 500 ms
      # ------------------------------------------------------------------
      - alert: SLOLatencyBudgetBurn
        expr: astrofin:slo:latency_p95:5m > 0.5
        for: 10m
        labels:
          severity: critical
          slo: latency
        annotations:
          summary: "SLO-2 latency: p95 of POST /api/v1/submit > 500ms for 10m"
          description: |
            p95 latency on the submission endpoint is {{ $value | humanizeDuration }}
            (target: < 500 ms). Investigate downstream ML-engine / feature-pipeline
            saturation.
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#slolatencybudgetburn

  - name: astrofin_service_health
    interval: 30s
    rules:

      # ------------------------------------------------------------------
      # ServiceDown — any astrofin-* service has stopped scraping
      # ------------------------------------------------------------------
      - alert: ServiceDown
        expr: astrofin:service:up:1m == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: |
            Prometheus has not been able to scrape {{ $labels.job }} for 2 minutes.
            Check the container/process and the network route.
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#servicedown

      # ------------------------------------------------------------------
      # HighErrorRate — 5xx ratio above 5% over 5 minutes
      # ------------------------------------------------------------------
      - alert: HighErrorRate
        expr: astrofin:service:error_rate:5m > 0.05
        for: 5m
        labels:
          severity: warning
          category: errors
        annotations:
          summary: "High 5xx rate on {{ $labels.service }}"
          description: |
            5xx error rate on {{ $labels.service }} is {{ $value | humanizePercentage }}
            over the last 5 minutes (threshold: 5%). Likely tied to a recent deploy
            or an upstream dependency.
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#higherrorrate

      - alert: HighErrorRateCritical
        expr: astrofin:service:error_rate:5m > 0.20
        for: 2m
        labels:
          severity: critical
          category: errors
        annotations:
          summary: "Critical 5xx rate on {{ $labels.service }}"
          description: |
            5xx rate on {{ $labels.service }} is {{ $value | humanizePercentage }} —
            a fifth of all requests are failing. Page on-call.
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#higherrorratecritical

      # ------------------------------------------------------------------
      # HighLatency — generic p95 > 1s for any service
      # (Catches services that are not /api/v1/submit, which has its own
      #  SLOLatencyBudgetBurn rule above.)
      # ------------------------------------------------------------------
      - alert: HighLatency
        expr: astrofin:service:latency_p95:5m > 1.0
        for: 10m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "p95 latency on {{ $labels.service }} > 1s for 10m"
          description: |
            p95 latency is {{ $value }}s. Check slow-query logs, downstream
            latency, and resource saturation (CPU/mem).
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#highlatency

      # ------------------------------------------------------------------
      # HealthcheckFailing — SLO-3: blackbox probe failures
      # ------------------------------------------------------------------
      - alert: HealthcheckFailing
        expr: probe_success{job="blackbox-web"} == 0
        for: 3m
        labels:
          severity: critical
          slo: healthcheck
        annotations:
          summary: "Blackbox healthcheck failing for {{ $labels.instance }}"
          description: |
            Healthcheck probe to {{ $labels.instance }} has been failing for
            3 minutes. Affects SLO-3 (99.95% target).
          runbook: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/RUNBOOK.md#healthcheckfailing

  - name: astrofin_meta
    interval: 30s
    rules:

      # ------------------------------------------------------------------
      # Watchdog — the existing self-test alert. Kept for Alertmanager→Slack
      # verification, do not remove.
      # ------------------------------------------------------------------
      - alert: Watchdog
        expr: vector(1)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Test alert from AstroFin Sentinel Platform"
          description: "Verifies Alertmanager → Slack/PagerDuty routing."
