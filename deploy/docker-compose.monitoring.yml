# =============================================================================
# Monitoring stack для AstroFin Sentinel Platform (staging + local dev).
#
# Использование:
#   docker compose -f deploy/docker-compose.monitoring.yml up -d
#
# Сервисы:
#   - prometheus    :9050 — сбор метрик
#   - alertmanager  :9053 — маршрутизация алертов
#   - grafana       :9051 — дашборды (admin/admin, сменить на проде)
#   - blackbox      :9115 — healthcheck prober
#   - node-exporter :9100 — host metrics
# =============================================================================

services:

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: astrofin-prometheus
    restart: unless-stopped
    ports:
      - "9050:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - ./deploy/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./deploy/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: astrofin-alertmanager
    restart: unless-stopped
    ports:
      - "9053:9093"
    volumes:
      - ./deploy/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      # Передаются из .env или CI (НЕ коммитить значения):
      SLACK_WEBHOOK_URL:     ${SLACK_WEBHOOK_URL:-}
      SLACK_WEBHOOK_SLO_URL: ${SLACK_WEBHOOK_SLO_URL:-}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-}
      SMTP_PASSWORD:         ${SMTP_PASSWORD:-}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

  grafana:
    image: grafana/grafana:11.2.0
    container_name: astrofin-grafana
    restart: unless-stopped
    ports:
      - "9051:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./deploy/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/astrofin-overview.json:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards/agent-performance.json:/var/lib/grafana/dashboards/agent-performance.json:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards/infrastructure-overview.json:/var/lib/grafana/dashboards/infrastructure-overview.json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: astrofin-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./deploy/monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: astrofin-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

volumes:
  prometheus-data:
  grafana-data:
