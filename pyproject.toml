[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "astrofin-sentinel-v5"
version = "5.0.0"
description = "Multi-Agent Trading System with KARL Self-Improvement and Astro-Timing"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "PROPRIETARY"}
authors = [{name = "asurdev", email = "mahaasur13@gmail.com"}]

dependencies = [
  # Core numerics
  "numpy>=1.26.0,<3.0",
  "pandas>=2.0.0,<3.0",
  "pydantic>=2.0.0,<3.0",
  "scikit-learn>=1.3.0,<2.0",
  "pyyaml>=6.0.0,<7.0",

  # AstroFin core
  "pyswisseph>=2.10.0,<3.0",
  "ta>=0.10.0,<1.0",
  "requests>=2.31.0,<3.0",

  # KARL / AMRE
  "sqlalchemy>=2.0.0,<3.0",
  "alembic>=1.13.0,<2.0",
  "psycopg2-binary>=2.9.9,<3.0",
  "redis>=5.0.0,<6.0",

  # API & monitoring
  "fastapi>=0.109.0,<1.0",
  "uvicorn[standard]>=0.27.0,<1.0",
  "psutil>=5.9.0,<6.0",
  "prometheus-client>=0.19.0,<1.0",

  # CLI & UI
  "rich>=13.7.0,<14.0",
  "click>=8.1.0,<9.0",

  # Networking / async (used by data_provider + tests)
  "aiohttp>=3.9.0,<4.0",
  "httpx>=0.26.0,<1.0",

  # Optional LLM (used by git_agent_exporter)
  "openai>=1.0.0,<2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0,<9.0",
  "pytest-asyncio>=0.23.0,<1.0",
  "ruff>=0.4.0,<1.0",
]

[project.scripts]
astrofin = "orchestration.sentinel_v5:cli"
astrofin-karl = "orchestration.karl_cli:cli"
astrofin-dashboard = "web.wsgi:launch"

[tool.setuptools.packages.find]
include = ["meta_rl*", "orchestration*", "agents*", "core*", "trading*", "web*", "data_provider*"]
exclude = ["tests*", "docs*", "bench*"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-q --tb=short"
asyncio_mode = "auto"
markers = [
  "unit: fast unit tests with no external deps (default)",
  "integration: tests that hit network/DB/disk",
  "slow: tests that take >1s",
]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = []