# ArgoCD Image Updater — auto-update images when Git tag changes
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/part-of: asurdev
spec:
  source:
    repoURL: https://github.com/mahaasur13-sys/AsurDev.git
    chart: argocd-image-updater
    targetRevision: v0.12.0
    helm:
      parameters:
        - name: config.secret.argocd_image_updater
          value: |
            registries:
              - name: ghcr.io
                default: true
                api_url: https://ghcr.io
                push_secret: ghcr-auth-secret
                credentials: |
                  url: ghcr.io/mahaasur13-sys
                  authorizer: |
                    credential_identities:
                      - registry: ghcr.io
                        credential_type: registry
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# Image update policy for ml-serving
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: asurdev-ml
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/mahaasur13-sys/AsurDev
  destinations:
    - server: https://kubernetes.default.svc
      namespace: ml
  imageRepositories:
    - name: asurdev-ml-api
      image: ghcr.io/mahaasur13-sys/asurdev-ml-api
      updateStrategy: latest-semver
      allowTags: "regexp:^v[0-9]+.[0-9]+.[0-9]+$"
      metadata:
        application: asurdev-ml-serving