# =============================================================================
# AsurDev — top-level compose
#
# Brings up the ACOS (Autonomous Constrained Optimization System) service
# together with the minimal infrastructure it needs to be useful in dev:
#   • redis     — fast cache, pub/sub, used by l9_ebl gates
#   • postgres  — durable trace / state store
#   • acos      — the optimization kernel itself (builds from acos/Dockerfile)
#   • prometheus + grafana — bundled via the existing monitoring overlay
#
# In production the cluster (atom-federation-os), the gpu worker
# (roma-execution-bridge) and the web dashboard each live in their own
# compose / helm chart; this file is the single-command "developer loop".
# =============================================================================

version: "3.9"

x-acos-env: &acos-env
  ACOS_HOME: /app
  ACOS_HTTP_PORT: "8080"
  ACOS_CONFIG_DIR: /etc/acos
  REDIS_URL: redis://redis:6379/0
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: acos
  POSTGRES_USER: acos
  POSTGRES_PASSWORD: ${ACOS_PG_PASSWORD:-acos_dev}
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: ${ACOS_LOG_LEVEL:-INFO}

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: acos-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - acos-redis:/data
    networks: [acos-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: acos-postgres
    environment:
      POSTGRES_DB: acos
      POSTGRES_USER: acos
      POSTGRES_PASSWORD: ${ACOS_PG_PASSWORD:-acos_dev}
    volumes:
      - acos-pg:/var/lib/postgresql/data
    networks: [acos-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acos -d acos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── ACOS kernel ─────────────────────────────────────────────────────────────
  acos:
    build:
      context: .
      dockerfile: acos/Dockerfile
    image: acos:local
    container_name: acos
    hostname: acos
    environment:
      <<: *acos-env
    volumes:
      - acos-config:/etc/acos
      - acos-data:/app/data
    networks: [acos-net]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "acos_cli", "invariants"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  acos-redis:
  acos-pg:
  acos-config:
  acos-data:

networks:
  acos-net:
    driver: bridge
