# TimescaleDB — StatefulSet with production-grade configuration
apiVersion: v1
kind: Namespace
metadata:
  name: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: timescale
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timescale-config
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
data:
  POSTGRES_PASSWORD: "changeme"  # Override via Secret in production
  POSTGRES_DB: "acos"
  POSTGRES_USER: "acos"
  TIMESCALE_TELEMETRY: "off"
  POSTGRES_MAX_connections: "200"
  POSTGRES_SHARED_BUFFERS: "256MB"
  POSTGRES_EFFECTIVE_CACHE_SIZE: "1GB"
  POSTGRES_MAINTENANCE_WORK_MEM: "128MB"
  POSTGRES_WAL_BUFFERS: "16MB"
  POSTGRES_CHECKPOINT_COMPLETION_TARGET: "0.9"
  POSTGRES_MAX_WAL_SIZE: "1GB"
  POSTGRES_MIN_WAL_SIZE: "80MB"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: timescale
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: timescale
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
subjects:
  - kind: ServiceAccount
    name: timescale
    namespace: timescaledb
roleRef:
  kind: Role
  name: timescale
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescale
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
    app.kubernetes.io/component: database
spec:
  serviceName: timescale
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: timescale
  template:
    metadata:
      labels:
        app.kubernetes.io/name: timescale
        app.kubernetes.io/part-of: asurdev
        app.kubernetes.io/component: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      serviceAccountName: timescale
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
      initContainers:
        - name: init
          image: timescale/promscale:0.5.0
          command:
            - sh
            - -c
            - echo "TimescaleDB init container"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: timescale
          image: timescale/timescaledb:latest-pg15
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
            - name: metrics
              containerPort: 9187
              protocol: TCP
          envFrom:
            - configMapRef:
                name: timescale-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timescale-secret
                  key: password
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: backup
              mountPath: /backups
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - acos
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - acos
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: timescale-data
        - name: backup
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: timescale
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
    - port: 9187
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: timescale
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescale-data
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: timescale
  namespace: timescaledb
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: timescale