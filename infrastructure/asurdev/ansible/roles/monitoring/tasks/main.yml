# Ansible role: Monitoring stack (Prometheus + Grafana + node_exporter)
- name: Monitoring — ensure docker is installed
  package:
    name: docker.io
    state: present

- name: Monitoring — ensure docker is running
  systemd:
    name: docker
    state: started
    enabled: true

- name: Monitoring — create directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/monitoring
    - /opt/monitoring/prometheus
    - /opt/monitoring/grafana/provisioning/datasources
    - /opt/monitoring/grafana/provisioning/dashboards

- name: Monitoring — copy prometheus config
  template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus/prometheus.yml
  notify: Restart Prometheus

- name: Monitoring — copy grafana datasources
  copy:
    src: grafana-datasources.yml
    dest: /opt/monitoring/grafana/provisioning/datasources/all.yml
  notify: Restart Grafana

- name: Monitoring — docker network
  shell: docker network create monitoring 2>/dev/null || true
  changed_when: false

- name: Monitoring — start Prometheus container
  docker_container:
    name: prometheus
    image: prom/prometheus:latest
    state: started
    restart_policy: always
    ports:
      - "9090:9090"
    volumes:
      - /opt/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - name: monitoring
    mounts:
      - type: volume
        source: prometheus_data
        target: /prometheus

- name: Monitoring — start Grafana container
  docker_container:
    name: grafana
    image: grafana/grafana:latest
    state: started
    restart_policy: always
    ports:
      - "3000:3000"
    env:
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password | default('admin') }}"
    volumes:
      - /opt/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - name: monitoring
    mounts:
      - type: volume
        source: grafana_data
        target: /var/lib/grafana

- name: Monitoring — start node_exporter on all nodes
  docker_container:
    name: node_exporter
    image: prom/node-exporter:latest
    state: started
    restart_policy: always
    ports:
      - "9100:9100"
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    network_mode: host
    pid_mode: host
   uts_mode: host
