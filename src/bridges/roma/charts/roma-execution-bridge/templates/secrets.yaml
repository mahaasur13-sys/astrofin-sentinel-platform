{{/*
Secrets for ROMA
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: roma-auth-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.apiServer.env.JWT_SECRET | default (randAlphaNum 32) }}

---
apiVersion: v1
kind: Secret
metadata:
  name: roma-stripe-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  stripe-secret-key: {{ .Values.apiServer.env.STRIPE_SECRET_KEY | default "" }}
  stripe-webhook-secret: {{ .Values.apiServer.env.STRIPE_WEBHOOK_SECRET | default "" }}

---
apiVersion: v1
kind: Secret
metadata:
  name: roma-network-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  tailscale-authkey: {{ .Values.apiServer.env.TAILSCALE_AUTHKEY | default "" }}
