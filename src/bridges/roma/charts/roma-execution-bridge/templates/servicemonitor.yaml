{{/*
ServiceMonitor for Prometheus Operator scraping
Enables: prometheus.io/scrape: "true", prometheus.io/port: "8080", prometheus.io/path: "/metrics"
*/}}
{{- if and .Values.apiServer.enabled .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}-api-server
  namespace: {{ .Values.serviceMonitor.namespace | default "monitoring" }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
    release: prometheus  # match Prometheus Operator scrape selector
spec:
  jobLabel: roma-api-server
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "roma-execution-bridge.name" . }}
      app.kubernetes.io/component: api-server
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: 10s
{{- end }}