{{/*
HPA for API Server and GPU Worker
*/}}
{{- if and .Values.apiServer.enabled .Values.apiServer.autoscaling.enabled }}
{{- $apiMetrics := .Values.apiServer.autoscaling }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}-api-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "roma-execution-bridge.fullname" . }}-api-server
  minReplicas: {{ $apiMetrics.minReplicas }}
  maxReplicas: {{ $apiMetrics.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $apiMetrics.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $apiMetrics.targetMemoryUtilizationPercentage }}
  {{- if and $apiMetrics.targetGPUUtilizationPercentage (gt ($apiMetrics.targetGPUUtilizationPercentage | default 0 | int) 0) }}
    - type: External
      external:
        metric:
          name: nvidia_gpu_utilization
          selector:
            matchLabels:
              cluster: {{ .Release.Name }}
        target:
          type: Utilization
          averageUtilization: {{ $apiMetrics.targetGPUUtilizationPercentage }}
  {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
{{- end }}

{{- if and .Values.gpuWorker.enabled .Values.gpuWorker.autoscaling.enabled }}
{{- $gpuMetrics := .Values.gpuWorker.autoscaling }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}-gpu-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "roma-execution-bridge.fullname" . }}-gpu-worker
  minReplicas: {{ $gpuMetrics.minReplicas }}
  maxReplicas: {{ $gpuMetrics.maxReplicas }}
  metrics:
    {{- if eq $gpuMetrics.metricType "Utilization" }}
    - type: Resource
      resource:
        name: nvidia.com/gpu
        target:
          type: Utilization
          averageUtilization: {{ $gpuMetrics.targetGPUUtilization }}
    {{- else }}
    - type: Pods
      pods:
        metric:
          name: roma_gpu_work_queue_depth
        target:
          type: AverageValue
          averageValue: "5"
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
{{- end }}
