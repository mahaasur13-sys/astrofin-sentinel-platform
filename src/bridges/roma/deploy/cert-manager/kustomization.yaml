apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager
resources:
  # Official cert-manager CRDs (apply first, no Helm needed for CRDs)
  - https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.crds.yaml
  - namespace.yaml
  - issuer.yaml
  # cert-manager installation via Helm (use `helm template` or ArgoCD)
  # Not included here — manage via Helm/ArgoCD to avoid YAML conflicts
commonLabels:
  app.kubernetes.io/name: cert-manager
  app.kubernetes.io/component: ca-certificates
transformers:
  - label.yaml