# =============================================================================
# SealedSecret — Stripe API Key
# =============================================================================
# Encrypt with: kubeseal --cert /var/lib/roma/sealed-secrets-crt.pem < stdin > stdout
# Install: kubectl apply -f deploy/values/sealed-secrets/stripe-sealed.yaml
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: roma-stripe
  namespace: roma-system
  labels:
    app.kubernetes.io/name: roma
    app.kubernetes.io/component: billing
spec:
  encryptedData:
    # Replace these with actual kubeseal output:
    # kubeseal --cert /var/lib/roma/sealed-secrets-crt.pem -o yaml < stripe-secret.yaml
    secret_key: ENCRYPTED_VALUE
    webhook_secret: ENCRYPTED_VALUE
  template:
    type: Opaque
    metadata:
      labels:
        app.kubernetes.io/name: roma
        app.kubernetes.io/component: billing
