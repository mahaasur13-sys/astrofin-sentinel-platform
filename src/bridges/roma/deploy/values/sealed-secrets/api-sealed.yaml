# =============================================================================
# SealedSecret — ROMA API Keys
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: roma-api-keys
  namespace: roma-system
spec:
  encryptedData:
    roma_api_key: ENCRYPTED_VALUE
    roma_webhook_secret: ENCRYPTED_VALUE
  template:
    type: Opaque
    metadata:
      labels:
        app.kubernetes.io/name: roma
        app.kubernetes.io/component: api
