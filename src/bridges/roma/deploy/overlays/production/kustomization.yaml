apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: roma-system

namePrefix: roma-
nameSuffix: -prod

commonLabels:
  cluster.roma.ai/environment: production

resources:
  - ../../k8s

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: roma-api-server
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
    target:
      kind: Deployment
      name: roma-gpu-worker
  - patch: |-
      - op: replace
        path: /spec/storageClassName
        value: rook-ceph-block
    target:
      kind: PersistentVolumeClaim
  - patch: |-
      - op: replace
        path: /spec/accessModes
        value: [ReadWriteOnce]
    target:
      kind: PersistentVolumeClaim
      name: roma-event-store
  - patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-secret
    target:
      kind: Deployment
