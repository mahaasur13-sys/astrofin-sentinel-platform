# =============================================================================
# ROMA — Pod Security Admission
# =============================================================================
# Applying baseline PSA to roma-system; cert-manager and system namespaces
# are exempt (kube-system, cert-manager, metallb-system).
# =============================================================================

apiVersion: policy/v1beta1
kind: PodSecurity
metadata:
  name: roma-baseline
  namespace: roma-system
spec:
  # Baseline: restricts nothing that is commonly exploited, but catches
  # most privilege escalations and accidental exposures.
  baseline:
    allowedHostPaths: []
    seccompProfiles:
      - runtime/default
      - unconfined
    supplementalGroups:
      ranges:
        - max: 65535
          min: 1
    runAsUser:
      rule: MustRunAsNonRoot
    fsGroup:
      rule: MustRunAs
      ranges:
        - max: 65535
          min: 1
    volumes:
      - configMap
      - emptyDir
      - persistentVolumeClaim
      - secret
      - projected
    hostNetwork: false
    hostPorts:
      - max: 65535
        min: 1
    hostPID: false
    hostIPC: false
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
      allowCapabilities: []
    defaultAddCapabilities: []

---
# Restricted PSA for rl-system (Kong Gateway — tighter than baseline)
apiVersion: policy/v1beta1
kind: PodSecurity
metadata:
  name: kong-restricted
  namespace: rl-system
spec:
  restricted:
    seccompProfiles:
      - runtime/default
    runAsUser:
      rule: MustRunAsNonRoot
    runAsGroup:
      rule: MustRunAs
      ranges:
        - max: 65535
          min: 1
    supplementalGroups:
      ranges:
        - max: 65535
          min: 1
    fsGroup:
      rule: MustRunAs
      ranges:
        - max: 65535
          min: 1
    volumes:
      - configMap
      - emptyDir
      - persistentVolumeClaim
      - secret
      - projected
    hostNetwork: false
    hostPID: false
    hostIPC: false
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    requireCanonicalCSCCapabilities: true