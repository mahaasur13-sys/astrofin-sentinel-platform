# =============================================================================
# ROMA RBAC — ServiceAccount + Role + RoleBinding + ClusterRole + ClusterRoleBinding
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: roma-executor
  namespace: roma-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: roma-executor
  namespace: roma-system
rules:
  - apiGroups: ["roma.ai"]
    resources: ["romatasks"]
    verbs: [get, list, watch, patch, update]
  - apiGroups: ["roma.ai"]
    resources: ["romatasks/status"]
    verbs: [get, patch, update]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, get, list, patch, watch]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: [get, list]
  - apiGroups: [""]
    resources: ["events"]
    verbs: [create, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: roma-executor
  namespace: roma-system
subjects:
  - kind: ServiceAccount
    name: roma-executor
    namespace: roma-system
roleRef:
  kind: Role
  name: roma-executor
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: roma-executor-cluster
rules:
  - apiGroups: ["roma.ai"]
    resources: ["romatasks"]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, get, list, patch]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: [get, list]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: [get, list]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: roma-executor-cluster
subjects:
  - kind: ServiceAccount
    name: roma-executor
    namespace: roma-system
roleRef:
  kind: ClusterRole
  name: roma-executor-cluster
  apiGroup: rbac.authorization.k8s.io
