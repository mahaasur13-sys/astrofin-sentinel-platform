apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: roma-system

resources:
  - namespaces/roma-system.yaml
  - ../k8s/RBAC/roma-rbac.yaml
  - storage/roma-pvc.yaml
  - configmaps/roma-configmap.yaml
  - secrets/roma-secrets.yaml
  - services/roma-extras.yaml
  - ../k8s/services/roma-ingress-nodeport.yaml
  - ../manifests/priority-classes.yaml
  - ../manifests/network-policies.yaml
  - ../manifests/pod-security.yaml

commonLabels:
  app.kubernetes.io/name: roma-execution-bridge
  app.kubernetes.io/managed-by: kustomize

secretGenerator:
  - name: roma-auth-secret
    behavior: merge
    literals:
      - jwt-secret=CHANGE_ME_production_use_vault

images:
  - name: ghcr.io/mahaasur13-sys/roma-execution-bridge
    newTag: "1.0.0"
  - name: ghcr.io/mahaasur13-sys/roma-gpu-worker
    newTag: "1.0.0"
