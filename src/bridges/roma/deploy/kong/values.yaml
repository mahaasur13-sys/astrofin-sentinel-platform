# =============================================================================
# Kong Gateway — values.yaml
# =============================================================================

# --- Ingress Controller (optional, we manage via K8s manifests) -------------
ingressController:
  enabled: true
  installCRDs: false  # CRDs managed separately

# --- Kong Backend DB (PostgreSQL via bitnami) ----------------------------------
env:
  database: "postgres"
  pg_host: "postgres-operator.rl-system.svc.cluster.local"
  pg_port: "5432"
  pg_user: "kong"
  pg_password:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: password
  pg_database: "kong"
  nginx_worker_processes: "auto"
  nginx_http_large_client_header_buffers: "16 64k"
  nginx_proxy_buffering: "off"

# --- Admin API (restricted) ---------------------------------------------------
admin:
  enabled: true
  http:
    enabled: true
    servicePort: 8001
  ingress:
    enabled: false  # Admin API not exposed outside cluster

# --- Proxy Service -------------------------------------------------------------
proxy:
  enabled: true
  type: LoadBalancer  # Will be overridden by Tailscale NodePort
  http:
    enabled: true
    servicePort: 80
    port: 8000
  tls:
    enabled: true
    servicePort: 443
    port: 8443
  annotations:
    tailscale.com/funnel: "true"
    tailscale.com/hostname: "kong-gateway"

# --- PostgreSQL Sub-chart ----------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: kong
    password: kong
    database: kong
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# --- Global Plugins (applied to all routes) ---------------------------------
# These are configured via KongPlugin CRDs in templates/plugins/
# See templates/plugins/ directory

# --- Enterprise Features (disabled — using OSS) ------------------------------
enterprise:
  enabled: false

# --- Pod Config ----------------------------------------------------------------
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8100"
  prometheus.io/path: "/metrics"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# --- Update Strategy ----------------------------------------------------------
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# --- Pod Disruption Budget ----------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# --- Topology Spread -----------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: node
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: kong

# --- Security Context ---------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# --- Service Monitor (for Prometheus) ----------------------------------------
serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  namespace: monitoring
