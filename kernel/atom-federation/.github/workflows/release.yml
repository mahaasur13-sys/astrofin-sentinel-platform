name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Install from dist
        run: pip install dist/*.whl

      - name: Verify version
        run: |
          VERSION=$(python3 -c "import sbs; print(sbs.__version__)")
          echo "Installed version: $VERSION"
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "FAIL: installed $VERSION != tag $TAG_VERSION"
            exit 1
          fi
          echo "PASS: version matches tag"

      - name: Run tests
        run: pytest sbs/tests/ alignment/test_gsct.py sbs/tests/test_sbs_contract.py -q

      - name: CLI smoke tests
        run: |
          sbs --version
          sbs verify
          sbs status
          sbs inspect --layer drl

      - name: Determinism check
        run: |
          for i in 1 2 3; do
            sbs verify 2>&1 | tee /tmp/run_$i.txt
          done > /dev/null
          if diff /tmp/run_1.txt /tmp/run_2.txt && diff /tmp/run_2.txt /tmp/run_3.txt; then
            echo "PASS: determinism identical"
          else
            echo "FAIL: output differs"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}