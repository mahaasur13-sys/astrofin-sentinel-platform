name: ATOM Operator CI

on:
  push:
    paths:
      - 'kubernetes/**'
      - 'cmd/**'
      - 'api/**'
      - 'controllers/**'
  pull_request:
  release:
    types: [published]

jobs:
  build-operator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build operator
        run: |
          cd /home/felix/atom-operator
          CGO_ENABLED=0 go build -ldflags="-s -w" -o atom-operator ./cmd/...

      - name: Build Docker image
        run: |
          cat > /home/felix/atom-operator/Dockerfile.scratch << 'DOCKER'
          FROM scratch
          COPY atom-operator /atom-operator
          USER 65532:65531
          ENTRYPOINT ["/atom-operator"]
          DOCKER
          docker build -f /home/felix/atom-operator/Dockerfile.scratch \
            -t ghcr.io/mahaasur13-sys/atom-operator:latest \
            /home/felix/atom-operator

      - name: Push image
        if: github.event_name == 'release'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u mahaasur13-sys --password-stdin
          docker push ghcr.io/mahaasur13-sys/atom-operator:latest

  kind-integration:
    runs-on: ubuntu-latest
    needs: build-operator
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Kind
        run: |
          curl -sLo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x /usr/local/bin/kind

      - name: Create cluster
        run: kind create cluster --name atom-test

      - name: Build & deploy operator
        run: |
          cd /home/felix/atom-operator
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o atom-operator ./cmd/...
          
          cat > Dockerfile.scratch << 'DOCKER'
          FROM scratch
          COPY atom-operator /atom-operator
          USER 65532:65531
          ENTRYPOINT ["/atom-operator"]
          DOCKER
          kind load docker-image localhost:5000/atom-operator:test --name atom-test || true

      - name: Apply CRD
        run: |
          kubectl apply -f /home/felix/atom-operator/config/crd/bases/federation.os.federation.os_atomclusters.yaml
          kubectl apply -f /home/felix/atom-operator/config/samples/

      - name: Wait for operator
        run: |
          kubectl wait -n atom-system --for=condition=Ready pods -l app=atom-operator --timeout=60s || true
          kubectl logs -n atom-system -l app=atom-operator --tail=10 || echo "No operator pods yet"

      - name: Verify AtomCluster
        run: |
          kubectl get atomcluster
          kubectl get pods -A
