# =============================================================================
# ROMA — Vault Helm Values (Production)
# =============================================================================
# Installs HashiCorp Vault (single-server, dev mode for home-cluster)
# For HA: set server HA.enabled=true + AWS/GCP/Azure auto-unseal
# =============================================================================

global:
  enabled: true
  # TLS disabled for home-cluster dev; enable for production:
  tlsDisable: true

# --- Server -------------------------------------------------------------------
server:
  image:
    repository: hashicorp/vault
    tag: "1.16.0"
    pullPolicy: IfNotPresent

  # Dev mode (single pod, no HA) — for home-lab / dev
  # For HA prod: set 'ha.enabled: true'
  dev:
    enabled: true
    # Dev mode auto-unseals — NOT for production secrets!

  # Resource limits (adjust for your hardware)
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Persistent storage (Longhorn)
  dataStorage:
    enabled: true
    size: 2Gi
    storageClass: "longhorn"
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: true
    size: 1Gi
    storageClass: "longhorn"
    accessMode: ReadWriteOnce

  # Inject agent sidecar into roma pods automatically
  injector:
    enabled: true
    image:
      repository: hashicorp/vault
      tag: "1.16.0"
    # Only patch roma-* pods
    namespaceSelector:
      matchLabels:
        app.kubernetes.io/created-by: roma

  # Pod disruption budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

