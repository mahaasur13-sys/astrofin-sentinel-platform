# =============================================================================
# ROMA — All-in-One Manifest
# =============================================================================
# Usage: kubectl apply -f deploy/manifests/all-in-one.yaml
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: roma-system
  labels:
    name: roma-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: roma-executor
  namespace: roma-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: roma-executor
  namespace: roma-system
rules:
  - apiGroups: ["roma.ai"]
    resources: ["romatasks"]
    verbs: [get, list, watch, patch, update]
  - apiGroups: ["roma.ai"]
    resources: ["romatasks/status"]
    verbs: [get, patch, update]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, get, list, patch, watch]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: [get, list]
  - apiGroups: [""]
    resources: ["events"]
    verbs: [create, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: roma-executor
  namespace: roma-system
subjects:
  - kind: ServiceAccount
    name: roma-executor
    namespace: roma-system
roleRef:
  kind: Role
  name: roma-executor
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roma-checkpoints
  namespace: roma-system
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 100Gi
  storageClassName: longhorn

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roma-models
  namespace: roma-system
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 200Gi
  storageClassName: longhorn

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roma-event-store
  namespace: roma-system
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
  storageClassName: longhorn

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: roma-config
  namespace: roma-system
data:
  APP_ENV: production
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  PYTHONUNBUFFERED: "1"
  ENABLE_RAFT: "true"
  ENABLE_STRIPE_BILLING: "true"
  ENABLE_PLUGINS: "true"
  ENABLE_OBSERVABILITY: "true"
  REDIS_HOST: roma-redis
  REDIS_PORT: "6379"
  POSTGRES_HOST: roma-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: roma
  S3_ENDPOINT: http://roma-minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_BUCKET: roma-artifacts

---
apiVersion: v1
kind: Secret
metadata:
  name: roma-auth-secret
  namespace: roma-system
type: Opaque
stringData:
  jwt-secret: CHANGE_ME_PRODUCTION

---
apiVersion: v1
kind: Secret
metadata:
  name: roma-stripe-secret
  namespace: roma-system
type: Opaque
stringData:
  stripe-secret-key: ""
  stripe-webhook-secret: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: roma-network-secret
  namespace: roma-system
type: Opaque
stringData:
  tailscale-authkey: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roma-api-server
  namespace: roma-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-execution-bridge
      app.kubernetes.io/component: api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roma-execution-bridge
        app.kubernetes.io/component: api-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: roma-executor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [api-server]
              topologyKey: kubernetes.io/hostname
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: api-server
      priorityClassName: roma-critical
      containers:
        - name: api-server
          image: ghcr.io/mahaasur13-sys/roma-execution-bridge:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: roma-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: roma-auth-secret
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
            - name: models
              mountPath: /app/models
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: roma-checkpoints
        - name: models
          persistentVolumeClaim:
            claimName: roma-models

---
apiVersion: v1
kind: Service
metadata:
  name: roma-api-server
  namespace: roma-system
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: api-server

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roma-gpu-worker
  namespace: roma-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-execution-bridge
      app.kubernetes.io/component: gpu-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roma-execution-bridge
        app.kubernetes.io/component: gpu-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: roma-executor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: gpu-worker
              topologyKey: kubernetes.io/hostname
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: gpu-worker
      priorityClassName: roma-critical
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: gpu-worker
          image: ghcr.io/mahaasur13-sys/roma-gpu-worker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: REDIS_HOST
              value: roma-redis
            - name: API_SERVER_URL
              value: http://roma-api-server:8080
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
            - name: models
              mountPath: /app/models
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: roma-checkpoints
        - name: models
          persistentVolumeClaim:
            claimName: roma-models

---
apiVersion: v1
kind: Service
metadata:
  name: roma-gpu-worker
  namespace: roma-system
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
  selector:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: gpu-worker

---
apiVersion: v1
kind: Service
metadata:
  name: roma-api-server-external
  namespace: roma-system
  annotations:
    tailscale.com/funnel: "true"
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      name: http
    - port: 8443
      targetPort: 8080
      nodePort: 30443
      name: https
  selector:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: api-server

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: roma-critical
value: 1000000
globalDefault: false
description: "Critical ROMA pods — api-server, gpu-worker — never evicted"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: roma-system
value: 100000
globalDefault: false
description: "Standard ROMA system pods"

---
# =============================================================================
# NetworkPolicies — Default deny-all + explicit allow
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: roma-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: rl-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# roma-api-server: allow Kong + self-ingress, controlled egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-roma-api-server
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
      ports:
        - port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    - ports:
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP

---
# roma-gpu-worker: allow ingress from api-server only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-roma-gpu-worker
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gpu-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080
    - ports:
        - port: 443
          protocol: TCP

---
# stripe-webhook: allow Kong ingress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-stripe-webhook
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: stripe-webhook
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
      ports:
        - port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080
    - ports:
        - port: 443
          protocol: TCP

---
# Kong Gateway (rl-system): allow external + Kong admin
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kong-proxy
  namespace: rl-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kong
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: roma-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: roma-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: stripe-webhook
      ports:
        - port: 8080
    - ports:
        - port: 443
          protocol: TCP

---
# =============================================================================
# Pod Security Admission
# =============================================================================

apiVersion: policy/v1beta1
kind: PodSecurity
metadata:
  name: roma-baseline
  namespace: roma-system
spec:
  baseline:
    allowedHostPaths: []
    seccompProfiles:
      - runtime/default
      - unconfined
    supplementalGroups:
      ranges:
        - max: 65535
          min: 1
    runAsUser:
      rule: MustRunAsNonRoot
    fsGroup:
      rule: MustRunAs
      ranges:
        - max: 65535
          min: 1
    volumes:
      - configMap
      - emptyDir
      - persistentVolumeClaim
      - secret
      - projected
    hostNetwork: false
    hostPorts:
      - max: 65535
        min: 1
    hostPID: false
    hostIPC: false
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
      allowCapabilities: []
    defaultAddCapabilities: []

---
apiVersion: policy/v1beta1
kind: PodSecurity
metadata:
  name: kong-restricted
  namespace: rl-system
spec:
  restricted:
    seccompProfiles:
      - runtime/default
    runAsUser:
      rule: MustRunAsNonRoot
    runAsGroup:
      rule: MustRunAs
      ranges:
        - max: 65535
          min: 1
    supplementalGroups:
      ranges:
        - max: 65535
          min: 1
    fsGroup:
      rule: MustRunAs
      ranges:
        - max: 65535
          min: 1
    volumes:
      - configMap
      - emptyDir
      - persistentVolumeClaim
      - secret
      - projected
    hostNetwork: false
    hostPID: false
    hostIPC: false
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    requireCanonicalCSCCapabilities: true