{{/*
ROMA API Server Service
*/}}
{{- if .Values.apiServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}-api-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
  {{- with .Values.apiServer.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.apiServer.service.type }}
  ports:
    - port: {{ .Values.apiServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "roma-execution-bridge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
{{- end }}

{{/*
GPU Worker Service
*/}}
{{- if .Values.gpuWorker.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}-gpu-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-worker
spec:
  type: {{ .Values.gpuWorker.service.type }}
  ports:
    - port: {{ .Values.gpuWorker.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "roma-execution-bridge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-worker
{{- end }}
