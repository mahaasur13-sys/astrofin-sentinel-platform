{{/*
Ingress for ROMA API Server
*/}}
{{- if and .Values.apiServer.ingress.enabled .Values.apiServer.ingress.className }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}-api-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
  {{- with .Values.apiServer.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.apiServer.ingress.className }}
  {{- if .Values.apiServer.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.apiServer.ingress.hostname }}
      secretName: {{ .Values.global.tlsSecretName | default (include "roma-execution-bridge.fullname" .) }}
  {{- end }}
  rules:
    - host: {{ .Values.apiServer.ingress.hostname }}
      http:
        paths:
          - path: {{ .Values.apiServer.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "roma-execution-bridge.fullname" . }}-api-server
                port:
                  number: {{ .Values.apiServer.service.port }}
{{- end }}

{{/*
PrometheusRule for alerting
*/}}
{{- if .Values.monitoring.prometheusRule.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}
  namespace: {{ .Values.monitoring.prometheusRule.namespace | default .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: roma-alerts
      rules:
        - alert: RomaAPIServerDown
          expr: up{job="roma-api-server"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "ROMA API Server is down"
            description: "ROMA API Server has been down for more than 2 minutes."
        - alert: RomaGPUWorkerRestarts
          expr: increase(kube_pod_container_status_restarts{namespace="{{ .Release.Namespace }}", pod=~"roma-.*-gpu-worker.*"}[5m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ROMA GPU Worker restarting frequently"
            description: "GPU worker pod has restarted more than 3 times in 5 minutes."
        - alert: RomaJobQueueDepthHigh
          expr: roma_queue_depth > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ROMA job queue depth is high"
            description: "Job queue depth is {{ "$value" }}, above threshold of 50."
{{- end }}
