# =============================================================================
# ROMA Tenant Operator — Kubernetes Deployment
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: roma-tenant-operator
  labels:
    app.kubernetes.io/name: roma-tenant-operator
    app.kubernetes.io/component: operator

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: roma-tenant-operator
  namespace: roma-tenant-operator

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: roma-tenant-operator
  labels:
    app.kubernetes.io/name: roma-tenant-operator
rules:
# CRUD on RomaTenant CR
- apiGroups: ["roma.io"]
  resources: ["romatenants"]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: ["roma.io"]
  resources: ["romatenants/status"]
  verbs: [get, patch, update]
- apiGroups: ["roma.io"]
  resources: ["romatenants/finalizers"]
  verbs: [update]
# Namespace management
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: [get, list, watch, create, delete]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: ["services"]
  verbs: [get, list, watch, create, update, patch, delete]
# Ingress + cert-manager
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: ["cert-manager.io"]
  resources: ["certificates"]
  verbs: [get, list, watch, create, update, patch, delete]
# Kong
- apiGroups: ["configuration.konghq.com"]
  resources: ["kongconsumers", "kongcredentials", "kongplugins"]
  verbs: [get, list, watch, create, update, patch, delete]
# Events
- apiGroups: [""]
  resources: ["events"]
  verbs: [create, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: roma-tenant-operator
  labels:
    app.kubernetes.io/name: roma-tenant-operator
subjects:
- kind: ServiceAccount
  name: roma-tenant-operator
  namespace: roma-tenant-operator
roleRef:
  kind: ClusterRole
  name: roma-tenant-operator
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roma-tenant-operator
  namespace: roma-tenant-operator
  labels:
    app.kubernetes.io/name: roma-tenant-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-tenant-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roma-tenant-operator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: roma-tenant-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: operator
        image: ghcr.io/mahaasur13-sys/roma-tenant-operator:latest
        imagePullPolicy: Always
        env:
        - name: KUBERNETES_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: VAULT_SECRET_PATH
          value: "roma/tenants"
        - name: KONG_NAMESPACE
          value: "kong"
        - name: ROMA_SYSTEM_NS
          value: "roma-system"
        - name: CERT_ISSUER
          value: "letsencrypt-prod"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: LOG_LEVEL
          value: "INFO"
        ports:
        - name: metrics
          containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: roma-tenant-operator
              topologyKey: kubernetes.io/hostname

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: roma-tenant-operator
  namespace: roma-tenant-operator
  labels:
    app.kubernetes.io/name: roma-tenant-operator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-tenant-operator

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: roma-tenant-operator
  namespace: roma-tenant-operator
  labels:
    app.kubernetes.io/name: roma-tenant-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-tenant-operator
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s