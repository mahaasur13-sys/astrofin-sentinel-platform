apiVersion: apps/v1
kind: Deployment
metadata:
  name: roma-gpu-worker
  namespace: roma-system
  labels:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: gpu-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-execution-bridge
      app.kubernetes.io/component: gpu-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roma-execution-bridge
        app.kubernetes.io/component: gpu-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: roma-executor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      # GPU nodes only
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: gpu-worker
          image: ghcr.io/mahaasur13-sys/roma-gpu-worker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: REDIS_HOST
              value: "roma-redis"
            - name: API_SERVER_URL
              value: "http://roma-api-server:8080"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
            - name: models
              mountPath: /app/models
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: roma-checkpoints
        - name: models
          persistentVolumeClaim:
            claimName: roma-models
---
apiVersion: v1
kind: Service
metadata:
  name: roma-gpu-worker
  namespace: roma-system
  labels:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: gpu-worker
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: gpu-worker
