# ============================================================
# Ceph Configuration (2-node cluster)
# ============================================================
# Ceph cluster network: 10.30.30.0/24 (VLAN 30 — storage)
# Public network:       10.20.20.0/24 (VLAN 20 — compute)

[global]
fsid                = <CLUSTER_FSID>
mon_host            = 10.20.20.10,10.20.20.11
mon_initial_members = home-rtx3060,edge-rk3576

# Cluster networks
cluster_network      = 10.30.30.0/24
public_network      = 10.20.20.0/24

# Networking
ms_bind_msgr2   = true
ms_bind_mon_msgr2 = true
mon_server_bind_msgr2 = true
osd_mkfs_type   = xfs

# Replication (2-node = 2x is minimum safe)
osd_pool_default_size       = 2
osd_pool_default_min_size   = 1
osd_pool_default_pg_num    = 32
osd_pool_default_pgp_num   = 32

# Heartbeat
osd_heartbeat_interval      = 6
osd_heartbeat_grace         = 20
mon_osd_min_down_ratio      = 0.5

# No erasure coding for 2-node (need min 3)
osd_pool_default_erasure_coding_profile = 

# Logging
log_file = /var/log/ceph/ceph.log
