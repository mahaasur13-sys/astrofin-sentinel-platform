---
# file: k8s/manifests/argocd/applications/roma-execution-bridge.yaml
# ArgoCD Application: roma-execution-bridge GitOps sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: roma-execution-bridge
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mahaasur13-sys/roma-execution-bridge.git
    targetRevision: master
    path: deploy/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: roma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  revisionHistoryLimit: 5