apiVersion: batch/v1
kind: CronJob
metadata:
  name: pod-restarter
  namespace: default
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pod-restarter-sa
          containers:
          - name: restarter
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              for ns in default acos; do
                for pod in $(kubectl get pods -n $ns -o jsonpath='{.items[?(@.status.phase!="Running")].metadata.name}'); do
                  echo "Restarting $pod in $ns"
                  kubectl delete pod $pod -n $ns --grace-period=30
                done
              done
          restartPolicy: OnFailure
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-restarter-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-restarter-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-restarter-binding
subjects:
- kind: ServiceAccount
  name: pod-restarter-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: pod-restarter-role
  apiGroup: rbac.authorization.k8s.io
