groups:
  - name: acos_alerts
    interval: 30s
    rules:
      - alert: SlurmControllerDown
        expr: up{job="slurmctld"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Slurm controller is down"

      - alert: CephOSDDown
        expr: ceph_osd_up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Ceph OSD is down"

      - alert: CephHealthError
        expr: ceph_health_status != 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Ceph health is not OK"

      - alert: RayHeadDown
        expr: up{job="ray"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Ray head is down"

      - alert: GPUUtilizationHigh
        expr: gpu_utilization > 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU at critical utilization"

      - alert: NodeDown
        expr: up{job="node_exporter"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Node is down"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"

      - alert: SelfHealingRestart
        expr: rate(systemd_restart_total[5m]) > 0
        labels:
          severity: info
        annotations:
          summary: "Self-healing service restart detected"
