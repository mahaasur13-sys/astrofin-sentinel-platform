---
- name: Ensure velero namespace exists
  k8s:
    name: "{{ velero_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Create velero credentials secret
  k8s:
    name: velero-s3-credentials
    namespace: "{{ velero_namespace }}"
    definition:
      apiVersion: v1
      kind: Secret
      type: Opaque
      stringData:
        cloud: |
          [default]
          aws_access_key_id={{ velero_s3_access_key }}
          aws_secret_access_key={{ velero_s3_secret_key }}

- name: Create BackupStorageLocation
  k8s:
    definition:
      apiVersion: velero.io/v1
      kind: BackupStorageLocation
      metadata:
        name: default
        namespace: "{{ velero_namespace }}"
      spec:
        provider: aws
        objectStorage:
          bucket: "{{ velero_s3_bucket }}"
          prefix: backups
        config:
          region: minio
          s3ForcePathStyle: "true"
          s3Url: "{{ velero_s3_url }}"
        credential:
          name: velero-s3-credentials
          key: cloud

- name: Create daily backup schedule
  k8s:
    definition:
      apiVersion: velero.io/v1
      kind: Schedule
      metadata:
        name: daily-backup
        namespace: "{{ velero_namespace }}"
      spec:
        schedule: "{{ velero_schedule_daily }}"
        ttl:
          expiration: "{{ velero_ttl_daily }}"
        includedNamespaces: "{{ velero_backup_namespaces }}"
        storageLocation: default

- name: Create weekly backup schedule
  k8s:
    definition:
      apiVersion: velero.io/v1
      kind: Schedule
      metadata:
        name: weekly-backup
        namespace: "{{ velero_namespace }}"
      spec:
        schedule: "{{ velero_schedule_weekly }}"
        ttl:
          expiration: "{{ velero_ttl_weekly }}"
        includedNamespaces: "{{ velero_backup_namespaces }}"
        storageLocation: default
