# file: ansible/roles/argocd/defaults/main.yml
# Default variables for ArgoCD role

argocd_version: "7.1.0"
argocd_chart_url: "https://argoproj.github.io/argo-helm"
argocd_chart_name: "argo/argo-cd"

# High Availability
argocd_replicas: 2
argocd_shards: 1

# Resources
argocd_server_cpu_limit: "1000m"
argocd_server_mem_limit: "1Gi"
argocd_server_cpu_req: "250m"
argocd_server_mem_req: "256Mi"

argocd_repo_server_cpu_limit: "500m"
argocd_repo_server_mem_limit: "512Mi"

argocd_controller_cpu_limit: "1000m"
argocd_controller_mem_limit: "2Gi"

# Ingress
argocd_domain: "argocd.home.local"
argocd_ingress_class: "nginx"
argocd_tls_secret: "argocd-tls"

# Server config
argocd_server_insecure: false
argocd_admin_password_length: 16

# Bootstrapping
argocd_bootstrap_applications: true
argocd_auto_sync: true
argocd_prune: true
argocd_self_heal: true

# Namespace
argocd_namespace: "argocd"