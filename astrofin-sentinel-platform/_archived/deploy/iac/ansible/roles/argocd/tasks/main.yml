---
# file: ansible/roles/argocd/tasks/main.yml
# ArgoCD Installation Tasks

- name: "[Argocd] Ensure namespace exists"
  kubernetes.core.k8s:
    name: "{{ argocd_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: "[Argocd] Create TLS secret for HTTPS"
  kubernetes.core.k8s:
    name: "{{ argocd_tls_secret }}"
    namespace: "{{ argocd_namespace }}"
    api_version: v1
    kind: Secret
    metadata:
      namespace: "{{ argocd_namespace }}"
    type: kubernetes.io/tls
    state: present
  ignore_errors: true

- name: "[Argocd] Add argo-helm repository"
  kubernetes.core.helm_repository:
    name: argo
    url: "{{ argocd_chart_url }}"

- name: "[Argocd] Install ArgoCD Helm chart"
  kubernetes.core.helm:
    name: argocd
    chart_ref: "{{ argocd_chart_name }}"
    chart_version: "{{ argocd_version }}"
    namespace: "{{ argocd_namespace }}"
    create_namespace: true
    values_files:
      - "{{ role_path }}/templates/argocd-values.yaml.j2"
    wait: true
    timeout: 10m

- name: "[Argocd] Wait for ArgoCD server to be ready"
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: "{{ argocd_namespace }}"
    name: argocd-server
  register: argocd_deploy
  until: "(argocd_deploy.resources | first).status.readyReplicas | default(0) >= 1"
  retries: 30
  delay: 10

- name: "[Argocd] Create Ingress with TLS"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: argocd-server
        namespace: "{{ argocd_namespace }}"
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/use-regex: "true"
      spec:
        ingressClassName: "{{ argocd_ingress_class }}"
        tls:
          - hosts:
              - "{{ argocd_domain }}"
            secretName: "{{ argocd_tls_secret }}"
        rules:
          - host: "{{ argocd_domain }}"
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: argocd-server
                      port:
                        number: 443

- name: "[Argocd] Get ArgoCD admin password (initial)"
  command: >
    kubectl get secret argocd-initial-admin-secret
    -n {{ argocd_namespace }}
    -o jsonpath="{.data.password}"
    2>/dev/null | base64 -d
  register: argocd_initial_password
  changed_when: false
  failed_when: false

- name: "[Argocd] Save admin credentials to file"
  copy:
    content: |
      ArgoCD URL: https://{{ argocd_domain }}
      Username: admin
      Password: {{ argocd_initial_password.stdout }}
      Generated: {{ ansible_date_time.iso8601 }}
    dest: "{{ playbook_dir }}/argocd-credentials.txt"
    mode: "0600"
  when: argocd_initial_password.stdout | length > 0

- name: "[Argocd] Display access info"
  debug:
    msg: |
      ========================================
      ArgoCD installed: https://{{ argocd_domain }}
      Username: admin
      Password: {{ argocd_initial_password.stdout | default('check argocd-credentials.txt') }}
      ========================================