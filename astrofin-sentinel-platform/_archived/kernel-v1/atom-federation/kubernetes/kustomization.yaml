# =============================================================================
# ATOM OS — Kustomize root
# Apply with: kubectl apply -k atom-federation-os/kubernetes/
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atom-system

resources:
  - manifests/install.yaml
  - manifests/rbac.yaml
  - crd/atomcluster.yaml
  - manifests/deployment.yaml

commonLabels:
  app.kubernetes.io/part-of: atom-os
  app.kubernetes.io/version: "7.0"