name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
          pip install pytest pytest-xdist pytest-asyncio
      - name: Doctor
        run: |
          source .venv/bin/activate
          sbs doctor
      - name: Unit tests
        run: |
          source .venv/bin/activate
          python -m pytest alignment/ orchestration/phase2/ federation/tests/ -q --ignore=federation/tests/test_byzantine.py
      - name: Chaos integration
        run: |
          source .venv/bin/activate
          pip install numpy
          python -m pytest chaos/ -q --ignore=chaos/test_chaos_grpc.py
