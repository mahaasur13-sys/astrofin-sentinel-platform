name: Deploy to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build'
        required: true
        default: 'ml-api'
        type: choice
        options:
          - ml-api
          - all

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  #---------------------------------------------------------------------------
  # ml-api — FastAPI ML inference engine (port 8081)
  #---------------------------------------------------------------------------
  ml-api:
    name: ml-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/asurdev-ml-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push ml-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml_engine/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ml-api
          cache-to: type=gha,mode=max,scope=ml-api
          platforms: linux/amd64

      - name: Verify image exists
        run: |
          digest=$(docker inspect ghcr.io/${{ env.OWNER }}/asurdev-ml-api:${{ github.sha }} --format '{{.RepoDigests}}')
          echo "digest=$digest" >> $GITHUB_ENV
          echo "::notice::Image pushed: ghcr.io/${{ env.OWNER }}/asurdev-ml-api:${{ github.sha }}"

  #---------------------------------------------------------------------------
  # CI pass gate — run tests before deploy
  #---------------------------------------------------------------------------
  ci-check:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff black pytest pytest-cov
      - run: ruff check .
      - run: black --check .
      - run: pytest --cov=ml_engine --cov-report=xml

  #---------------------------------------------------------------------------
  # Image digest summary (comment on PR)
  #---------------------------------------------------------------------------
  digest-pr-comment:
    name: PR Comment
    needs: [ml-api, ci-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post digest comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🐳 Image deployed\n\n' +
                    '`ghcr.io/${{ env.OWNER }}/asurdev-ml-api:${{ github.sha }}`\n\n' +
                    '| Field | Value |\n' +
                    '|-------|-------|\n' +
                    '| Digest | `'${{ env.digest }}'` |\n' +
                    '| Branch | `${{ github.ref_name }}` |\n' +
                    '| CI | [${{ job.status }}](${{ github.run_url }}) |'
            })
