# Ansible role: WireGuard mesh setup
- name: WireGuard — install
  package:
    name: wireguard-tools
    state: present

- name: WireGuard — ensure directory exists
  file:
    path: /etc/wireguard
    state: directory
    mode: "0700"

- name: WireGuard — generate private key
  command: wg genkey
  register: wg_private_key
  changed_when: false

- name: WireGuard — generate public key
  shell: echo "{{ wg_private_key.stdout }}" | wg pubkey
  register: wg_public_key
  changed_when: false

- name: WireGuard — apply config
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: "0600"
  notify: Restart WireGuard

- name: WireGuard — enable autostart
  systemd:
    name: wg-quick@wg0
    enabled: true
    state: started
