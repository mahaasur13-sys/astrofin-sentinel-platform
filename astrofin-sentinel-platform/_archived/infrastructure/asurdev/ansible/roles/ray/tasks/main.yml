# Ansible role: Ray cluster setup
- name: Ray — install via pip
  pip:
    name: ray[default]
    extra_args: --user
    state: present

- name: Ray — create Ray job directory
  file:
    path: /opt/ray-jobs
    state: directory
    mode: "0755"

- name: Ray — start head node
  shell: |
    ray stop 2>/dev/null || true
    ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --num-gpus=1 --block
  async: 5
  poll: 0
  when: "'rtx_node' in group_names"
  ignore_errors: true

- name: Ray — start worker node
  shell: |
    ray stop 2>/dev/null || true
    ray start --address={{ ray_head_ip }}:6379 --num-gpus=0 --block
  async: 5
  poll: 0
  when: "'rk3576_node' in group_names"
  ignore_errors: true
