# ML Training — PyTorch training job with GPU resources
apiVersion: v1
kind: Namespace
metadata:
  name: ml
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-training
  namespace: ml
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-training-config
  namespace: ml
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
data:
  TRAINING_EPOCHS: "50"
  BATCH_SIZE: "128"
  LEARNING_RATE: "0.001"
  HORIZON_MINUTES: "30"
  LOG_LEVEL: "info"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ml-training
  namespace: ml
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ml-training
  namespace: ml
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
subjects:
  - kind: ServiceAccount
    name: ml-training
    namespace: ml
roleRef:
  kind: Role
  name: ml-training
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-training
  namespace: ml
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
    app.kubernetes.io/component: training
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ml-training
            app.kubernetes.io/part-of: asurdev
            app.kubernetes.io/component: training
        spec:
          serviceAccountName: ml-training
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          restartPolicy: OnFailure
          nodeSelector:
            node-type: gpu-worker
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: "gpu-nvidia"
                        operator: In
                        values: ["available"]
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: ml-training
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: trainer
              image: ghcr.io/mahaasur13-sys/asurdev-ml-api:latest
              command:
                - python
                - -m
                - ml_engine.training.trainer
              envFrom:
                - configMapRef:
                    name: ml-training-config
              env:
                - name: ML_MODEL_PATH
                  value: "/models/failure_xgb_v2.pkl"
                - name: ML_FEATURES_PATH
                  value: "/models/features.txt"
              resources:
                requests:
                  cpu: "2"
                  memory: 4Gi
                  nvidia.com/gpu: "1"
                limits:
                  cpu: "4"
                  memory: 8Gi
                  nvidia.com/gpu: "1"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: models
                  mountPath: /models
                  readOnly: true
                - name: training-data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: models
              emptyDir: {}
            - name: training-data
              persistentVolumeClaim:
                claimName: ml-training-data
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 1Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-backfill
  namespace: ml
  labels:
    app.kubernetes.io/name: ml-backfill
    app.kubernetes.io/part-of: asurdev
    app.kubernetes.io/component: training
spec:
  schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ml-backfill
            app.kubernetes.io/part-of: asurdev
            app.kubernetes.io/component: training
        spec:
          serviceAccountName: ml-training
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          restartPolicy: OnFailure
          nodeSelector:
            node-type: gpu-worker
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          containers:
            - name: backfill
              image: ghcr.io/mahaasur13-sys/asurdev-ml-api:latest
              command:
                - python
                - -m
                - ml_engine.feedback.retrainer
              envFrom:
                - configMapRef:
                    name: ml-training-config
              resources:
                requests:
                  cpu: "1"
                  memory: 2Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ml-training
  namespace: ml
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-training