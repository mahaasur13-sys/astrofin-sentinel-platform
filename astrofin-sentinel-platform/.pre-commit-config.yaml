---
# AstroFin Sentinel V5 — pre-commit hooks
# BlackRock-style enforcement: secret detection, lint, format, static type check, architecture linter.
#
# Install:
#   pip install pre-commit detect-secrets
#   pre-commit install
# Run manually:
#   pre-commit run --all-files

repos:
  # ─── Secret detection (zero-tolerance, hard fail) ────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline=.secrets.baseline
          - --exclude-files=tests/.*\.py$
          - --exclude-files=docs/.*\.md$
        stages: [pre-commit, manual]

  # ─── Formatter + linter ─────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ─── Security linter ────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [--exit-zero, -ll, --skip=B101]

  # ─── Static type check (best-effort on a multi-agent codebase) ─────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, pydantic]
        args: [--ignore-missing-imports, --no-strict-optional, --follow-imports=silent]
        files: ^(agents|scripts|core|orchestration)/.*\.py$
        stages: [manual]   # run via `pre-commit run --hook-stage manual mypy`

  # ─── Housekeeping ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-ast
        files: \.py$

  # ─── Custom: architecture linter (BlackRock-inspired rules) ─────────────
  - repo: local
    hooks:
      - id: architecture-linter
        name: architecture linter (BlackRock rules)
        entry: python scripts/architecture_linter.py
        language: system
        types: [python]
        files: ^(agents|orchestration|core|web|scripts)/.*\.py$
        stages: [pre-commit]
        pass_filenames: false

      - id: validate-registry-coverage
        name: validate AGENT_AGENTS registry coverage
        entry: python scripts/validate_registry.py
        language: system
        types: [python]
        files: ^agents/(gitagent_registry\.py|_impl/.*\.py)$
        pass_filenames: false
