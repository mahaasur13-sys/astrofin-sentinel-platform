name: DR Drill (Velero Restore)

on:
  workflow_dispatch:        # ручной запуск
  schedule:
    - cron: '0 4 * * 1'     # каждую неделю в понедельник в 4:00 UTC

env:
  KUBERNETES_VERSION: v1.29
  KIND_VERSION: v0.23.0
  VELERO_VERSION: v1.14.0

jobs:
  dr-drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: |
          cat <<EOF | kind create cluster --config=-
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
          - role: worker
          - role: worker
          EOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBERNETES_VERSION }}

      - name: Install Velero CLI
        run: |
          curl -LO https://github.com/vmware-tanzu/velero/releases/download/${{ env.VELERO_VERSION }}/velero-${{ env.VELERO_VERSION }}-linux-amd64.tar.gz
          tar -xzf velero-${{ env.VELERO_VERSION }}-linux-amd64.tar.gz
          sudo mv velero-${{ env.VELERO_VERSION }}-linux-amd64/velero /usr/local/bin/
          velero version

      - name: Setup MinIO (S3 backend)
        run: |
          kubectl create ns velero
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: minio
            namespace: velero
          spec:
            containers:
            - name: minio
              image: minio/minio:latest
              args: ["server", "/data"]
              ports:
              - containerPort: 9000
              volumeMounts:
              - name: data
                mountPath: /data
            volumes:
            - name: data
              emptyDir: {}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: minio
            namespace: velero
          spec:
            ports:
            - port: 9000
              targetPort: 9000
            selector:
              app: minio
          EOF
          kubectl wait --for=condition=ready pod minio -n velero --timeout=120s

      - name: Install Velero server
        run: |
          velero install \
            --provider aws \
            --bucket velero-bucket \
            --secret-file <(echo -e "[default]\naws_access_key_id=minioadmin\naws_secret_access_key=minioadmin") \
            --backup-location-config region=us-east-1,s3ForcePathStyle=true,s3Url=http://minio.velero:9000 \
            --use-volume-snapshots=false \
            --wait
          kubectl wait --for=condition=available deployment -n velero velero --timeout=120s

      - name: Build Helm dependencies
        run: |
          helm dependency build charts/roma-execution-bridge

      - name: Deploy roma-execution-bridge (Helm)
        run: |
          helm install roma charts/roma-execution-bridge \
            --namespace roma \
            --create-namespace \
            --set apiServer.replicaCount=2 \
            --set gpuWorker.enabled=false
          kubectl wait --for=condition=ready deployment -n roma roma-api-server --timeout=120s

      - name: Create sample RomaTenant CR
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: roma.io/v1
          kind: RomaTenant
          metadata:
            name: dr-test-tenant
            namespace: roma
          spec:
            plan: free
            branding:
              companyName: "DR Test"
            compute:
              maxWorkers: 1
          EOF
          kubectl wait --for=condition=ready romatenant/dr-test-tenant -n roma --timeout=60s || true

      - name: Create Velero backup
        run: |
          velero backup create roma-dr-backup \
            --include-namespaces roma \
            --wait
          velero backup get roma-dr-backup
          velero backup describe roma-dr-backup --details

      - name: Simulate disaster (delete namespace)
        run: |
          echo "⚠️  Simulating disaster: deleting namespace roma"
          kubectl delete ns roma --wait=true
          sleep 5
          kubectl get ns roma 2>&1 || echo "Namespace deleted (expected)"

      - name: Restore from backup
        run: |
          velero restore create --from-backup roma-dr-backup --wait
          velero restore get
          velero restore describe $(velero restore get -o jsonpath='{.items[0].metadata.name}')

      - name: Verify restore
        run: |
          kubectl get ns roma -o jsonpath='{.status.phase}'
          echo ""
          kubectl get romatenant dr-test-tenant -n roma
          API_PODS=$(kubectl get pods -n roma -l app.kubernetes.io/component=api-server --no-headers 2>/dev/null | grep -c Running || echo "0")
          echo "Running api-server pods: $API_PODS"
          if [ "$API_PODS" -ge 1 ]; then
            echo "✅ DR drill PASSED"
          else
            echo "❌ Insufficient pods running"
            exit 1
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dr-drill-logs-${{ github.run_number }}
          path: |
            /tmp/velero-*.log
            kind-export-*.log
          retention-days: 30