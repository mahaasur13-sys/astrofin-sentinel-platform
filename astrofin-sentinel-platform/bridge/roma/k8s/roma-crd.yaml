# =============================================================================
# ROMA CRD — Kubernetes Native Resource Definition
# kind: RomaTask
# 
# Design principles:
# - Declarative desired state
# - Controller reconciliation (NOT operator pattern — simpler)
# - No generation of missing fields — strict contract
# =============================================================================

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: romatasks.roma.ai
  annotations:
    roma.ai/version: "1.0"
    roma.ai/strict-mode: "true"
spec:
  group: roma.ai
  names:
    kind: RomaTask
    plural: romatasks
    shortNames: [rt]
    singular: romatask
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [task]
              # STRICT: no additional properties
              additionalProperties: false
              properties:
                task:
                  type: string
                  minLength: 1
                  description: "Task description (MANDATORY)"
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
                gpuRequired:
                  type: boolean
                  default: false
                executionMode:
                  type: string
                  enum: [k8s_job, ray_job]
                  default: k8s_job
                backpressureAware:
                  type: boolean
                  default: true
              # NO additionalProperties: false at spec level

            status:
              type: object
              properties:
                jobId:
                  type: string
                phase:
                  type: string
                  enum: [Pending, Queued, Scheduled, Running, Completed, Failed, Cancelled]
                createdAt:
                  type: string
                  format: date-time
                startedAt:
                  type: string
                  format: date-time
                completedAt:
                  type: string
                  format: date-time
                k8sJobName:
                  type: string
                nodeName:
                  type: string
                error:
                  type: string
                gpuAllocated:
                  type: boolean
                queuePosition:
                  type: integer
                dag:
                  type: array
                  items:
                    type: object
                    properties:
                      step:
                        type: string
                      dependsOn:
                        type: array
                        items:
                          type: string
                      action:
                        type: string
                      image:
                        type: string
                      gpu:
                        type: boolean

---
# =============================================================================
# RomaTask Controller — Reconciliation Loop
# Watches RomaTask resources and dispatches to Execution Bridge
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: roma-controller
  namespace: roma-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: roma-controller
  namespace: roma-system
rules:
- apiGroups: ["roma.ai"]
  resources: ["romatasks"]
  verbs: [get, list, watch, patch, update]
- apiGroups: ["roma.ai"]
  resources: ["romatasks/status"]
  verbs: [get, patch, update]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: [create, delete, get, list, patch]
- apiGroups: [""]
  resources: ["pods"]
  verbs: [get, list]
- apiGroups: [""]
  resources: ["events"]
  verbs: [create, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: roma-controller
  namespace: roma-system
subjects:
- kind: ServiceAccount
  name: roma-controller
  namespace: roma-system
roleRef:
  kind: Role
  name: roma-controller
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# Example RomaTask — Train YOLOv8
# =============================================================================

apiVersion: roma.ai/v1
kind: RomaTask
metadata:
  name: yolov8-training-001
  namespace: roma-jobs
spec:
  task: "train YOLOv8 on RTX3060 with COCO dataset"
  priority: 8
  gpuRequired: true
  executionMode: k8s_job
  backpressureAware: true