name: CodeRabbit Safety Scan (Weekly)

on:
  schedule:
    # Каждую среду в 09:00 UTC
    - cron: "0 9 * * 3"
  workflow_dispatch:
    inputs:
      reason:
        description: "Причина ручного запуска"
        required: false
        default: "manual"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: coderabbit-safety-scan
  cancel-in-progress: false

jobs:
  safety-scan:
    name: Trigger CodeRabbit safety scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log scan trigger
        env:
          EVENT: ${{ github.event_name }}
          REASON: ${{ github.event.inputs.reason }}
          REPO: ${{ github.repository }}
        run: |
          echo "CodeRabbit safety scan triggered for ${REPO}"
          echo "event=${EVENT} reason=${REASON:-scheduled}"
          echo "Safety scans are run by the CodeRabbit GitHub App on this repository."

      - name: Verify CodeRabbit bot is installed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Checking that CodeRabbit is installed on ${REPO}..."
          gh api "repos/${REPO}/installation/repositories" \
            --jq '.repositories[].full_name' \
            2>/dev/null \
            | grep -q "CodeRabbit" \
            && echo "✓ CodeRabbit installation detected" \
            || echo "Note: verify CodeRabbit app install at https://github.com/settings/installations"