apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astrofin-sentinel-web
  namespace: astrofin-sentinel
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - astrofin.example.com
      secretName: astrofin-sentinel-tls
  rules:
    - host: astrofin.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: astrofin-sentinel-web
                port:
                  number: 80