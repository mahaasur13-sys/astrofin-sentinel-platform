apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: astrofin-sentinel-web
  namespace: astrofin-sentinel
  labels:
    app.kubernetes.io/name: astrofin-sentinel-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: astrofin-sentinel-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max