# Blackbox exporter — probes for AstroFin Sentinel healthchecks
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      preferred_ip_protocol: ip4

  http_healthz:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200]
      headers:
        X-Probe-Source: prometheus-blackbox

  http_readyz:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200]
