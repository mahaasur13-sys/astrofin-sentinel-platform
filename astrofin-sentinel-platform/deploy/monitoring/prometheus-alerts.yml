# =============================================================================
# Prometheus alert rules — AstroFin Sentinel Platform
#
# Severity conventions:
#   info     — soft signal, no page
#   warning  — page on-call during business hours, ticket otherwise
#   critical — page on-call 24/7
#
# Runbook: docs/RUNBOOK.md (для каждого alert есть секция с диагностикой)
# SLO:     docs/slo.md
# =============================================================================

groups:

  # ---------------------------------------------------------------------------
  # 1. SLO-driven alerts
  # ---------------------------------------------------------------------------
  - name: astrofin_slo
    interval: 30s
    rules:

      - alert: SLOLatencyBudgetBurn
        expr: |
          (
            sum(rate(http_request_duration_seconds_bucket{le="0.2",service="web-dashboard"}[5m]))
            /
            sum(rate(http_request_duration_seconds_count{service="web-dashboard"}[5m]))
          ) < (1 - 0.001)
        for: 5m
        labels:
          severity: critical
          slo:      "latency-p95-200ms"
          team:     sre
        annotations:
          summary: "SLO latency budget burning fast"
          description: |
            Более 0.1% запросов к web-dashboard превышают 200 ms за последние 5 мин.
            Это быстрое исчерпание latency budget.
          runbook_url: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/docs/RUNBOOK.md#slo-latency

      - alert: SLOAvailabilityBurn
        expr: |
          (
            sum(rate(http_requests_total{service="web-dashboard",code!~"5.."}[5m]))
            /
            sum(rate(http_requests_total{service="web-dashboard"}[5m]))
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          slo:      "availability-99.9"
          team:     sre
        annotations:
          summary: "Availability ниже 99.9%"
          description: |
            Текущая успешность web-dashboard: {{ $value | humanizePercentage }}.
            Для выполнения SLO 99.9% необходимо вернуться к ≥ 99.9% за 30 дней.
          runbook_url: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/docs/RUNBOOK.md#slo-availability

  # ---------------------------------------------------------------------------
  # 2. Health & liveness
  # ---------------------------------------------------------------------------
  - name: astrofin_health
    interval: 30s
    rules:

      - alert: HealthcheckFailing
        expr: probe_success{job="blackbox-web"} == 0
        for: 2m
        labels:
          severity: critical
          team:     sre
        annotations:
          summary: "Healthcheck endpoint /healthz не отвечает"
          description: |
            Healthcheck endpoint не возвращает 2xx уже 2 минуты.
            Сервис, вероятно, недоступен или в состоянии crashloop.
          runbook_url: https://github.com/mahaasur13-sys/astrofin-sentinel-platform/blob/master/docs/RUNBOOK.md#healthcheck-failing

      - alert: HealthcheckSlow
        expr: probe_duration_seconds{job="blackbox-web"} > 0.2
        for: 5m
        labels:
          severity: warning
          team:     sre
        annotations:
          summary: "Healthcheck endpoint отвечает медленно"
          description: "Healthcheck latency = {{ $value | humanizeDuration }} (SLO: < 200 ms)"

      - alert: ReadinessFailing
        expr: probe_success{job="blackbox-ready"} == 0
        for: 5m
        labels:
          severity: warning
          team:     sre
        annotations:
          summary: "Readiness probe не проходит"
          description: "Pod отмечен как NotReady и не может принимать трафик."

  # ---------------------------------------------------------------------------
  # 3. Pod restarts & resource pressure
  # ---------------------------------------------------------------------------
  - name: astrofin_k8s
    interval: 30s
    rules:

      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total{namespace="astrofin-sentinel"}[15m]) * 60 * 15 > 3
        for: 5m
        labels:
          severity: critical
          team:     sre
        annotations:
          summary: "Pod {{ $labels.pod }} crash-looping"
          description: |
            Контейнер {{ $labels.container }} в pod {{ $labels.pod }}
            рестартовался > 3 раз за последние 15 минут.

      - alert: PodRestartingFrequently
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="astrofin-sentinel"}[1h]) > 5
        for: 10m
        labels:
          severity: warning
          team:     sre
        annotations:
          summary: "Pod {{ $labels.pod }} перезапускается слишком часто"
          description: "Более 5 рестартов за последний час."

      - alert: PodCPUThrottled
        expr: |
          (
            rate(container_cpu_cfs_throttled_seconds_total{namespace="astrofin-sentinel"}[5m])
            /
            rate(container_cpu_cfs_periods_total{namespace="astrofin-sentinel"}[5m])
          ) > 0.25
        for: 10m
        labels:
          severity: warning
          team:     sre
        annotations:
          summary: "Pod {{ $labels.pod }} испытывает CPU throttling"
          description: |
            Более 25% CPU-периодов подвержены throttling.
            Рекомендуется увеличить CPU limit или оптимизировать код.

      - alert: PodMemoryPressure
        expr: |
          container_memory_working_set_bytes{namespace="astrofin-sentinel"}
            /
          container_spec_memory_limit_bytes{namespace="astrofin-sentinel"}
            > 0.85
        for: 10m
        labels:
          severity: warning
          team:     sre
        annotations:
          summary: "Pod {{ $labels.pod }} использует > 85% memory limit"
          description: "Возможен OOMKill при росте нагрузки."

      - alert: DeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas{namespace="astrofin-sentinel"}
            !=
          kube_deployment_status_replicas_available{namespace="astrofin-sentinel"}
        for: 5m
        labels:
          severity: warning
          team:     sre
        annotations:
          summary: "Deployment {{ $labels.deployment }} не имеет всех replicas ready"
          description: |
            spec={{ $value }} replicas ≠ status replicas available.
            Возможна проблема с rolling update.

  # ---------------------------------------------------------------------------
  # 4. Application-specific (delegated to existing alerts.yml domain logic)
  # ---------------------------------------------------------------------------
  # см. также: alerts.yml (OOS fail rate, KARL drift, drawdown, data room)