name: Disk fill simulation
description: Fill temp space, verify Ceph/OSD alerts trigger
duration: 180
steps:
  - name: fill_disk
    type: exec
    command: dd if=/dev/zero of=/tmp/bigfile bs=1M count=1000 oflag=append conv=notrunc || true
    target: storage-node
  - name: check_ceph_warning
    type: prometheus_query
    query: ceph_osd_used_percent > 80
    expected_value: false
    timeout: 30
  - name: cleanup
    type: exec
    command: rm -f /tmp/bigfile
    target: storage-node
  - name: verify_cleanup
    type: exec
    command: df -h /tmp
    expect_contains:
      - /tmp
