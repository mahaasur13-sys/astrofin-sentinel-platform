groups:
  - name: home-cluster-alerts
    interval: 30s
    rules:
      - alert: NodeDown
        expr: up{job="nodes"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"

      - alert: HighGPULoad
        expr: DCGM_FI_DEV_GPU_UTIL > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU utilization > 90% on {{ $labels.node }}"

      - alert: CephOSDDown
        expr: ceph_osd_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ceph OSD {{ $labels.osd }} is down"

      - alert: SlurmControllerDown
        expr: up{job="slurm"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Slurm controller is unreachable"

      - alert: HighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
