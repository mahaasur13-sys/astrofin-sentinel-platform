---
# file: k8s/manifests/argocd/applications/clusters-direct.yaml
# ArgoCD ApplicationSet: multi-cluster management via cluster-config
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clusters
  namespace: argocd
spec:
  generators:
    - clusters:
        values:
          clusterManagementEnabled: "true"
  template:
    metadata:
      name: "{{ name }}-infra"
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/mahaasur13-sys/home-cluster-iac.git
        targetRevision: master
        path: "clusters/{{ name }}"
        directory:
          recurse: true
      destination:
        server: "{{ server }}"
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
      retry:
        limit: 3