---
# file: k8s/manifests/argocd/applications/home-cluster-iac.yaml
# ArgoCD Application: home-cluster-iac (IaC sync via Ansible/Terraform hooks)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-cluster-iac
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/mahaasur13-sys/home-cluster-iac.git
    targetRevision: master
    path: k8s/manifests
    directory:
      recurse: false
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
      - PruneLast=false
  # IaC apps: no auto-sync for Terraform/Ansible
  # Sync triggered manually or via CI webhook
  retry:
    limit: 3
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 5m
  revisionHistoryLimit: 3