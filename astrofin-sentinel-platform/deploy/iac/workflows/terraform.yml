name: Terraform CI

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

jobs:
  terraform:
    name: Terraform ${{ matrix.tf_version }}
    runs-on: ubuntu-latest
    container:
      image: hashicorp/terraform:${{ matrix.tf_version }}
    strategy:
      fail-fast: false
      matrix:
        tf_version: ["1.6", "1.7", "1.8"]
        directory:
          - terraform
          - terraform/modules/network
          - terraform/modules/storage
          - terraform/modules/vpn_mesh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ matrix.tf_version }}
        run: |
          terraform version
          echo "Hashicorp Terraform $(terraform version | head -1)"

      - name: Read configuration
        working-directory: ${{ matrix.directory }}
        run: |
          echo "=== terraform.tfvars ==="
          cat terraform.tfvars.example 2>/dev/null || echo "(no terraform.tfvars.example)"
          echo ""
          echo "=== variables.yaml ==="
          cat variables.tf 2>/dev/null | head -20

      - name: Terraform fmt check
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check -recursive -diff

      - name: Terraform init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Terraform plan (no state)
        working-directory: ${{ matrix.directory }}
        run: terraform plan -no-color -input=false 2>&1 | head -50
        continue-on-error: true

  terraform-backend:
    name: Terraform backend best-practice check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check backend configuration
        run: |
          echo "=== Checking for backend configuration ==="
          if grep -r "backend" terraform/ --include="*.tf" | grep -v "hashicorp/" | grep -v "# backend"; then
            echo "✅ Backend configured"
          else
            echo "⚠️  WARNING: No Terraform backend configured (local state only)"
          fi

      - name: Validate outputs.tf coverage
        run: |
          echo "=== outputs.tf validation ==="
          REQUIRED_OUTPUTS="rtx_node rk3576_node network_vlans slurm ceph"
          for output in $REQUIRED_OUTPUTS; do
            if grep -q "^output" terraform/outputs.tf 2>/dev/null; then
              echo "✅ $output found"
            else
              echo "⚠️  $output missing"
            fi
          done
