# SLSA-4 Production Configuration
version: "1.0"
release:
  allowed_branches: [main]
  blocking_tags: []
  require_signing: true
  require_provenance: true
  require_attestation: true

oidc:
  issuer: "https://token.actions.githubusercontent.com"
  required_audience: "sigstore"
  min_token_lifetime: 300

sigstore:
  fulcio_url: "https://fulcio.sigstore.dev"
  rekor_url: "https://rekor.sigstore.dev"
  oidc_issuer: "https://oauth2.sigstore.dev/auth"
  oidc_client_id: "sigstore"

opa:
  policy_bundle: "policy/slsa4.rego"
  gates: 7
  hard_fail: true

lccp:
  version: "1.2"
  deterministic_only: true
  source_of_truth: "git-index"

cvgg:
  policy_hash: "5f2a2c04fe3718ab2a3d3941ef53e4fd426850b480a7b6195b457af08377d201"
  required_for_release: true

provenance:
  format: "slsa/in-toto/v1"
  predicate_type: "https://slsa.dev/provenance/v1"
  reproducible: true
