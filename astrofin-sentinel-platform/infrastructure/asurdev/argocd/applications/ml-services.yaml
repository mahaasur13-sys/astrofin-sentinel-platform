# ArgoCD Applications — ML services deployed via GitOps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: asurdev-ml-serving
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: ml-serving
    app.kubernetes.io/part-of: asurdev
    app.kubernetes.io/component: inference
spec:
  project: default
  source:
    repoURL: https://github.com/mahaasur13-sys/AsurDev.git
    targetRevision: HEAD
    path: manifests/ml-serving
  destination:
    server: https://kubernetes.default.svc
    namespace: ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: asurdev-ml-training
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: ml-training
    app.kubernetes.io/part-of: asurdev
    app.kubernetes.io/component: training
spec:
  project: default
  source:
    repoURL: https://github.com/mahaasur13-sys/AsurDev.git
    targetRevision: HEAD
    path: manifests/ml-training
  destination:
    server: https://kubernetes.default.svc
    namespace: ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    retry:
      limit: 3
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: asurdev-timescale
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: timescale
    app.kubernetes.io/part-of: asurdev
    app.kubernetes.io/component: database
spec:
  project: default
  source:
    repoURL: https://github.com/mahaasur13-sys/AsurDev.git
    targetRevision: HEAD
    path: manifests/timescale
  destination:
    server: https://kubernetes.default.svc
    namespace: timescaledb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5