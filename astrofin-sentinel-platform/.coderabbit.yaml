# CodeRabbit configuration for AstroFin Sentinel Platform
# https://docs.coderabbit.ai/guides/configure-coderabbit

reviews:
  # Auto-review on all branches, not just default
  auto_review:
    enabled: true
    base_branches: ["main", "consolidation-v1", "master"]
  profile: "ASSERTIVE"
  request_changes_workflow: true
  high_level_summary: true
  poem: false

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"
