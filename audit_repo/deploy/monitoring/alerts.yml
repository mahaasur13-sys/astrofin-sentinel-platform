groups:
  - name: astrofin_domain
    rules:
      - alert: HighOOSFailRate
        expr: astrofin_oos_fail_rate > 0.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OOS failure rate > 40%"
          description: "Out-of-sample fail rate is {{ $value | humanizePercentage }}"

      - alert: KARLDrift
        expr: astrofin_karl_drift_detected == 1
        labels:
          severity: warning
        annotations:
          summary: "KARL model drift detected"
          description: "KARL synthesis agent detected concept drift"

      - alert: LowWinRate
        expr: astrofin_meta_rl_win_rate < 0.45
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Win rate below 45%"
          description: "Meta-RL win rate is {{ $value | humanizePercentage }}"

      - alert: HighDrawdown
        expr: astrofin_drawdown_percent > 0.08
        labels:
          severity: critical
        annotations:
          summary: "Drawdown exceeds 8%"
          description: "Current drawdown is {{ $value | humanizePercentage }}"

      - alert: DataRoomConflictUnresolved
        expr: data_room_conflicts_unresolved > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Unresolved data room conflicts"
          description: "There are {{ $value }} unresolved conflicts in the Data Room"

      - alert: DataRoomIncomplete
        expr: time() - data_room_last_inventory_update > 86400
        labels:
          severity: warning
        annotations:
          summary: "Data room inventory not updated in 24h"
          description: "Last inventory update was more than 24 hours ago"
