apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atom-operator
  namespace: {{ .Values.rbac.namespace }}
  labels:
    app.kubernetes.io/name: atom-operator
    app.kubernetes.io/version: "7.1"
spec:
  serviceName: atom-operator
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: atom-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atom-operator
        app.kubernetes.io/version: "7.1"
    spec:
      serviceAccountName: {{ .Values.rbac.operatorServiceAccount }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: operator
          image: {{ .Values.operator.image }}
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8080
            - name: metrics
              containerPort: 9464
          env:
            - name: WATCH_NAMESPACE
              value: {{ .Values.operator.watchNamespace }}
            - name: RECONCILE_INTERVAL
              value: "{{ .Values.operator.reconcileInterval }}"
            - name: LOG_LEVEL
              value: {{ .Values.operator.logLevel }}
            - name: HEALTH_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.operator.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: atom-operator
  namespace: {{ .Values.rbac.namespace }}
  labels:
    app.kubernetes.io/name: atom-operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: atom-operator
  ports:
    - name: metrics
      port: 9464
      targetPort: 9464
    - name: health
      port: 8080
      targetPort: 8080
