# =============================================================================
# compose-check.yml — static validation of every docker-compose.yml in the repo
#
# This workflow does NOT need a Docker daemon: it only runs
#   docker compose -f <file> config --quiet
# which parses the compose file, interpolates `.env` (if present), resolves
# relative build contexts, and exits non-zero on any structural error.
#
# As a second pass, it greps every `dockerfile:` path out of every
# docker-compose.yml in the repo and asserts the file actually exists
# on disk, so a typo in a Dockerfile path fails CI before it ever
# reaches `docker build`.
# =============================================================================

name: compose-check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-compose:
    name: validate docker-compose files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (compose v2 plugin)
        uses: docker/setup-buildx-action@v3

      # docker compose -f <file> config --quiet  — parses the file,
      # resolves ${VAR} interpolation, and returns the merged config.
      # Exits non-zero on schema / interpolation / bind errors.
      - name: Validate every docker-compose*.yml
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t files < <(find . -type f \
                                 \( -name 'docker-compose.yml' \
                                 -o -name 'docker-compose.*.yml' \
                                 -o -name 'docker-compose.yaml' \
                                 -o -name 'docker-compose.*.yaml' \) \
                                 -not -path './.git/*' \
                                 -not -path '*/node_modules/*' \
                                 | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No docker-compose*.yml files found — nothing to validate."
            exit 0
          fi
          echo "Found ${#files[@]} compose file(s):"
          printf '  - %s\n' "${files[@]}"
          failures=0
          for f in "${files[@]}"; do
            echo
            echo "── Validating: $f ──"
            if docker compose -f "$f" config --quiet; then
              echo "   ✓ $f parses cleanly"
            else
              echo "   ✗ $f FAILED to parse"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo
            echo "✗ $failures compose file(s) failed validation"
            exit 1
          fi
          echo
          echo "✓ All ${#files[@]} compose file(s) passed static validation"

      # Assert every `dockerfile:` path referenced by compose files
      # actually exists. `docker compose config` does not check this —
      # it only fails at build time, after the daemon is involved.
      - name: Verify all referenced Dockerfile paths exist
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \
                                 \( -name 'docker-compose.yml' \
                                 -o -name 'docker-compose.*.yml' \) \
                                 -not -path './.git/*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No compose files — skipping dockerfile existence check."
            exit 0
          fi
          missing=0
          for f in "${files[@]}"; do
            dir=$(dirname "$f")
            # Pull every `dockerfile:` / `dockerfile_inline` line out of the file.
            while IFS= read -r rel; do
              # `dockerfile:` is relative to the `build.context` (default = compose file dir).
              if [ -n "$rel" ]; then
                target="$dir/$rel"
                if [ ! -f "$target" ]; then
                  echo "✗ $f references missing Dockerfile: $rel  (looked at $target)"
                  missing=$((missing + 1))
                else
                  echo "✓ $f → $rel"
                fi
              fi
            done < <(awk '/^[ ]*dockerfile:[ ]*/{ sub(/^[ ]*dockerfile:[ ]*/,""); print }' "$f" || true)
          done
          if [ "$missing" -gt 0 ]; then
            echo
            echo "✗ $missing Dockerfile path(s) missing"
            exit 1
          fi
          echo
          echo "✓ All referenced Dockerfiles are present"
