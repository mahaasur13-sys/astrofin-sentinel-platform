# =============================================================================
# SealedSecret — PostgreSQL Credentials
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: roma-database
  namespace: roma-system
spec:
  encryptedData:
    password: ENCRYPTED_VALUE
    connection_string: ENCRYPTED_VALUE
  template:
    type: Opaque
    metadata:
      labels:
        app.kubernetes.io/name: roma
        app.kubernetes.io/component: database
