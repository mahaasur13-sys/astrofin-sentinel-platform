{{/*
PVCs for ROMA
*/}}
{{- if .Values.persistence.checkpoints.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roma-checkpoints
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "roma-execution-bridge.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - {{ .Values.persistence.checkpoints.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.persistence.checkpoints.size }}
  {{- if .Values.persistence.checkpoints.storageClass }}
  storageClassName: {{ .Values.persistence.checkpoints.storageClass }}
  {{- end }}
{{- end }}

{{- if .Values.persistence.models.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roma-models
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "roma-execution-bridge.name" . }}
