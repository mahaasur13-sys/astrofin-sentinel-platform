# =============================================================================
# ROMA CRD + Controller RBAC
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: roma-controller
  namespace: roma-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: roma-controller
  namespace: roma-system
rules:
  - apiGroups: ["roma.ai"]
    resources: ["romatasks"]
    verbs: [get, list, watch, patch, update]
  - apiGroups: ["roma.ai"]
    resources: ["romatasks/status"]
    verbs: [get, patch, update]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, get, list, patch]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: [get, list]
  - apiGroups: [""]
    resources: ["events"]
    verbs: [create, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: roma-controller
  namespace: roma-system
subjects:
  - kind: ServiceAccount
    name: roma-controller
    namespace: roma-system
roleRef:
  kind: Role
  name: roma-controller
  apiGroup: rbac.authorization.k8s.io
