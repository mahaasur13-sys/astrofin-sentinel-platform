apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    description: "Let's Encrypt STAGING issuer — for testing TLS before production"
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@roma.internal
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    description: "Let's Encrypt PRODUCTION — rate limited (50 certs/week), test with staging first"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@roma.internal
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Example: how to use with Kong Gateway ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-tls
  namespace: kong
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging  # swap to letsencrypt-prod for production
    kubernetes.io/tls-acme: "true"
    acme.cert-manager.io/http01-edit-in-place: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.roma.internal
      secretName: kong-tls-cert
  rules:
    - host: api.roma.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxy-kong
                port:
                  number: 80
---
# Stripe webhook TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stripe-webhook-tls
  namespace: stripe-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - webhook.roma.internal
      secretName: stripe-webhook-tls-cert
  rules:
    - host: webhook.roma.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stripe-webhook
                port:
                  number: 80