apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: roma-system

namePrefix: roma-
nameSuffix: -hc

commonLabels:
  cluster.roma.ai/environment: home-cluster

resources:
  - ../../k8s

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/nvidia.com/gpu
        value: "2"
    target:
      kind: Deployment
      name: roma-gpu-worker
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: roma-api-server
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: roma-gpu-worker
  - patch: |-
      - op: replace
        path: /spec/storageClassName
        value: longhorn
    target:
      kind: PersistentVolumeClaim
  - patch: |-
      - op: replace
        path: /data/S3_ENDPOINT
        value: http://10.61.0.20:9000
    target:
      kind: ConfigMap
      name: roma-config
