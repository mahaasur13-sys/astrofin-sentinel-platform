# =============================================================================
# ROMA — NetworkPolicies
# =============================================================================
# Default deny-all + explicit allow per service
# System namespaces (kube-system, cert-manager, metallb-system) are exempted
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: roma-system
spec:
  # No ingress allowed by default — explicit policies open what is needed
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Kong Gateway — rl-system namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: rl-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# roma-api-server: allow from Kong proxy + itself (for cluster-internal calls)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-roma-api-server-ingress
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api-server
  policyTypes:
    - Ingress
  ingress:
    # Kong proxy → api-server
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
      ports:
        - port: 8080
    # Same-component (api-server pods can talk to each other)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080
    # Readiness probes
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
    # Postgres (roma-postgres in roma-system)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: roma-postgres
      ports:
        - port: 5432
    # Vault (if present)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - port: 8200
    # S3 / MinIO
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: roma-minio
      ports:
        - port: 9000
    # GPU workers
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gpu-worker
      ports:
        - port: 8000

---
# roma-api-server: allow all egress (needed for S3, Vault, external APIs)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-roma-api-server-egress
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api-server
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    # Allow all other outbound (HTTPS to external APIs, S3, etc.)
    - ports:
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP

---
# roma-gpu-worker: allow ingress from roma-api-server only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-roma-gpu-worker-ingress
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gpu-worker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8000
    # kubelet health checks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
    - ports:
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP

---
# stripe-webhook: allow only Kong proxy ingress (Stripe calls → Kong → webhook)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-stripe-webhook-ingress
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: stripe-webhook
  policyTypes:
    - Ingress
  ingress:
    # Kong → stripe-webhook (webhook traffic)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
      ports:
        - port: 8080
    # Health checks from kube-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    # Stripe outbound API (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
    # roma-api-server
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080

---
# roma-redis: allow ingress from roma-system components only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 6379
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gpu-worker
      ports:
        - port: 6379
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: stripe-webhook
      ports:
        - port: 6379
    # Health checks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 6379
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP

---
# roma-postgres: allow ingress from roma-system only, strict egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: roma-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: roma-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 5432
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gpu-worker
      ports:
        - port: 5432
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: stripe-webhook
      ports:
        - port: 5432
    # Kong (admin API)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rl-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
      ports:
        - port: 5432
    # Health checks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP

---
# Kong Gateway (rl-system): allow ingress from external + Stripe
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kong-proxy-ingress
  namespace: rl-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kong
  policyTypes:
    - Ingress
  ingress:
    # External traffic via NodePort/LoadBalancer
    - ports:
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
    # Tailscale funnel
    - ports:
        - port: 8000
          protocol: TCP
    # Health checks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    # Kong → roma-api-server (upstream)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: roma-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api-server
      ports:
        - port: 8080
    # Kong → roma-stripe-webhook
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: roma-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: stripe-webhook
      ports:
        - port: 8080
    # Kong → postgres
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres-operator
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - port: 5432
    - ports:
        - port: 443
          protocol: TCP

---
# cert-manager (cert-manager namespace): allow DNS + ACME + webhooks
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cert-manager
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # API server webhook calls
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 9402
          protocol: TCP
  egress:
    # DNS for ACME DNS-01 challenges
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    # Let's Encrypt ACME servers (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
    # Kubernetes API
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              component: kube-apiserver
      ports:
        - port: 443
          protocol: TCP