# =============================================================================
# Kong Ingress — Multi-Tenant API Routing
# =============================================================================
# Strategy:
#   - Path-based: /api/roma/      → roma-api-server
#   - Subdomain:  tenant.roma.com → Kong VirtualStanza (future)
#   - Header:     X-Tenant-ID    → plugin-based routing
#
# Rate limits applied via KongPlugin annotations on Services
# =============================================================================

---
# --- ROMA API Server Ingress via Kong ----------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roma-api-kong
  namespace: roma-system
  labels:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: api-gateway
  annotations:
    # Kong annotations
    konghq.com/plugins: |
      cors-delegate,
      tenant-routing,
      prometheus-metrics,
      roma-rate-limit-free
    konghq.com/preserve-host: "true"
    # Rewrite: strip /api/roma prefix → / for backend
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Rate limit class
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-RateLimit-Policy: free";
    # Custom headers for tenant context
    nginx.ingress.kubernetes.io/server-snippet: |
      set_by_lua $tenant_id "return kong.request.get_header('X-Tenant-ID') or 'unknown'";
spec:
  ingressClassName: kong
  rules:
    - host: api.roma.com
      http:
        paths:
          - path: /api/roma(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kong-admin.kong.svc.cluster.local
                port:
                  number: 8001
            # Note: route directly to Kong admin for Kong-native routing
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-proxy.kong.svc.cluster.local
                port:
                  number: 80
  # TLS terminates at Tailscale Funnel (not here)
  # tls:
  #   - hosts:
  #     - api.roma.com
  #     secretName: roma-tls-secret

---
# --- Direct backend ingress (bypassing Kong for internal) --------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roma-api-direct
  namespace: roma-system
  labels:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: api-server
  annotations:
    kubernetes.io/ingress.class: "kong-internal"
    konghq.com/plugins: "cors-delegate,tenant-routing"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /internal/
            pathType: Prefix
            backend:
              service:
                name: roma-api-server
                port:
                  number: 8080