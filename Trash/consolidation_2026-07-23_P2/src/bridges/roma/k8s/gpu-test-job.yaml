# =============================================================================
# ROMA GPU Test Job — nvidia-smi verification
# Run: kubectl apply -f gpu-test-job.yaml
# Expected: pod on GPU node, nvidia-smi output visible in logs
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: roma-gpu-test
  namespace: roma-system
  labels:
    app: roma-executor
    purpose: gpu-validation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: roma-executor
        purpose: gpu-validation
    spec:
      restartPolicy: Never
      nodeSelector:
        gpu: "true"
      tolerations:
      - key: "gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: gpu-test
        image: nvidia/cuda:12.6.3-runtime-ubuntu24.04
        command: ["nvidia-smi"]
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            nvidia.com/gpu: "1"
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: gpu
                operator: In
                values: ["true"]