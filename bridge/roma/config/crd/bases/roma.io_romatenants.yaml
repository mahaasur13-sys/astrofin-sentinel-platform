# =============================================================================
# ROMA Tenant CRD — Custom Resource Definition
# kind: RomaTenant
# apiVersion: roma.io/v1
# =============================================================================
# Design:
#   - White-label multi-tenant: each partner gets isolated namespace
#   - Controller reconciles: Namespace + Secrets + Ingress + Certificates + Kong
#   - Branding via ConfigMap (logo URL, primary color, company name)
#   - Plans: free | pro | enterprise → rate limits via KongPlugin
# =============================================================================

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: romatenants.roma.io
  annotations:
    roma.io/version: "1.0"
    controller.gen.k8s.io: "roma-tenant-controller"
spec:
  group: roma.io
  names:
    kind: RomaTenant
    plural: romatenants
    shortNames: [rt, romat]
    singular: romatenant
  scope: ClusterScoped        # Tenant lives at cluster level
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [tenantId, domain, plan]
              additionalProperties: false
              properties:
                # ---------- Identity ----------
                tenantId:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{2,62}[a-z0-9]$"
                  description: "Unique tenant identifier (used for namespace, secrets, subdomain)"
                  examples: ["partner-acme", "reseller-beta"]
                displayName:
                  type: string
                  description: "Human-readable tenant name"
                  examples: ["ACME Corp"]
                domain:
                  type: string
                  description: "Primary domain for this tenant's API"
                  examples: ["api.acme.com"]
                subdomain:
                  type: string
                  description: "Subdomain prefix (default: same as tenantId)"
                  examples: ["acme"]
                plan:
                  type: string
                  enum: [free, pro, enterprise]
                  default: free
                  description: "Billing plan — maps to rate limits and resource quotas"
                tier:
                  type: integer
                  minimum: 1
                  maximum: 3
                  default: 1
                  description: "Internal tier (1=free, 2=pro, 3=enterprise)"
                # ---------- Branding ----------
                branding:
                  type: object
                  additionalProperties: false
                  properties:
                    logoUrl:
                      type: string
                      format: uri
                      description: "URL to tenant's logo (256x256 PNG)"
                    faviconUrl:
                      type: string
                      format: uri
                    primaryColor:
                      type: string
                      pattern: "^#[0-9A-Fa-f]{6}$"
                      examples: ["#FF5733"]
                    secondaryColor:
                      type: string
                      pattern: "^#[0-9A-Fa-f]{6}$"
                    companyName:
                      type: string
                      examples: ["ACME Corporation"]
                    supportEmail:
                      type: string
                      format: email
                    websiteUrl:
                      type: string
                      format: uri
                # ---------- Compute ----------
                compute:
                  type: object
                  additionalProperties: false
                  properties:
                    gpuEnabled:
                      type: boolean
                      default: false
                    gpuModel:
                      type: string
                      enum: [any, nvidia-t4, nvidia-a100, nvidia-rtx3090, nvidia-rtx4090]
                      default: any
                    maxWorkers:
                      type: integer
                      minimum: 0
                      maximum: 100
                      default: 4
                    memoryLimitGi:
                      type: number
                      minimum: 1
                      maximum: 256
                      default: 8
                    cpuLimit:
                      type: string
                      pattern: "^\\d+m?$"
                      examples: ["2000m", "4"]
                # ---------- Storage ----------
                storage:
                  type: object
                  additionalProperties: false
                  properties:
                    s3Bucket:
                      type: string
                      description: "S3 bucket name for tenant data"
                    minioEndpoint:
                      type: string
                      description: "MinIO server endpoint (if self-hosted)"
                    storageQuotaGi:
                      type: integer
                      minimum: 1
                      maximum: 10000
                      default: 50
                # ---------- Networking ----------
                networking:
                  type: object
                  additionalProperties: false
                  properties:
                    customCertificates:
                      type: boolean
                      default: false
                    tlsSecretName:
                      type: string
                      description: "Pre-existing TLS Secret name (optional)"
                    vpcCidr:
                      type: string
                      pattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
                      examples: ["10.100.0.0/16"]
                    allowedIpRanges:
                      type: array
                      items:
                        type: string
                      examples: ["10.0.0.0/8", "192.168.0.0/16"]
                # ---------- Billing ----------
                billing:
                  type: object
                  additionalProperties: false
                  properties:
                    stripeCustomerId:
                      type: string
                      description: "Stripe Customer ID for billing"
                    billingEmail:
                      type: string
                      format: email
                    invoicePrefix:
                      type: string
                      pattern: "^[A-Z0-9]{2,10}$"
                # ---------- Features ----------
                features:
                  type: object
                  additionalProperties: false
                  properties:
                    prometheusMetrics:
                      type: boolean
                      default: false
                    advancedAnalytics:
                      type: boolean
                      default: false
                    customPlugins:
                      type: boolean
                      default: false
                    ssoEnabled:
                      type: boolean
                      default: false
                    auditLogRetentionDays:
                      type: integer
                      minimum: 1
                      maximum: 365
                      default: 30
                # ---------- Vault ------
                vaultSecrets:
                  type: object
                  additionalProperties: false
                  properties:
                    apiKeySecretPath:
                      type: string
                      description: "Vault KV path for tenant API key"
                      examples: ["roma/tenants/acme/api-keys"]
                    dbPasswordPath:
                      type: string
                      description: "Vault KV path for tenant DB password"
                # ---------- Labels/Annotations ----------
                metadata:
                  type: object
                  additionalProperties: false
                  properties:
                    labels:
                      type: object
                      additionalProperties: true
                    annotations:
                      type: object
                      additionalProperties: true

            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Provisioning, Ready, Failed, Suspended]
                message:
                  type: string
                namespace:
                  type: string
                  description: "Created namespace name"
                ingressEndpoint:
                  type: string
                  description: "Ingress endpoint for tenant API"
                certificateReady:
                  type: boolean
                kongConsumerReady:
                  type: boolean
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: [True, False, Unknown]
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time