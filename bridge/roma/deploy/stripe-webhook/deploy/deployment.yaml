apiVersion: v1
kind: Namespace
metadata:
  name: roma-system
  labels:
    app.kubernetes.io/name: roma
    app.kubernetes.io/component: stripe-webhook
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stripe-webhook-env
  namespace: roma-system
data:
  ROMA_API_URL: "http://roma-api-server.roma-system.svc.cluster.local:8080"
  REDIS_URL: "redis://redis.roma-system.svc.cluster.local:6379/0"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: stripe-webhook-secret
  namespace: roma-system
type: Opaque
stringData:
  STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_WHSEC_xxx"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stripe-webhook
  namespace: roma-system
  labels:
    app.kubernetes.io/name: stripe-webhook
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: roma
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: stripe-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stripe-webhook
        app.kubernetes.io/component: webhook
        app.kubernetes.io/part-of: roma
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: webhook
          image: roma-stripe-webhook:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: stripe-webhook-env
          env:
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-webhook-secret
                  key: STRIPE_WEBHOOK_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: stripe-webhook

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stripe-webhook
  namespace: roma-system
  labels:
    app.kubernetes.io/name: stripe-webhook
    app.kubernetes.io/component: webhook
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stripe-webhook
---
apiVersion: v1
kind: Service
metadata:
  name: stripe-webhook
  namespace: roma-system
  labels:
    app.kubernetes.io/name: stripe-webhook
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: stripe-webhook
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stripe-webhook-ingress
  namespace: roma-system
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: cors-delegate
spec:
  rules:
    - host: api.roma.dev
      http:
        paths:
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: stripe-webhook
                port:
                  number: 8080