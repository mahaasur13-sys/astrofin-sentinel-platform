apiVersion: apps/v1
kind: Deployment
metadata:
  name: roma-api-server
  namespace: roma-system
  labels:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: api-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-execution-bridge
      app.kubernetes.io/component: api-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roma-execution-bridge
        app.kubernetes.io/component: api-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: roma-executor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values: [api-server]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api-server
          image: ghcr.io/mahaasur13-sys/roma-execution-bridge:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: roma-config
          env:
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: roma-auth-secret
                  key: jwt-secret  # reuse for S3 (replace with dedicated secret)
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: roma-stripe-secret
                  key: stripe-secret-key
              # optional: omit if empty
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: roma-stripe-secret
                  key: stripe-webhook-secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: roma-auth-secret
                  key: jwt-secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: roma-postgres-secret
                  key: password
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
            - name: models
              mountPath: /app/models
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: roma-checkpoints
        - name: models
          persistentVolumeClaim:
            claimName: roma-models
---
apiVersion: v1
kind: Service
metadata:
  name: roma-api-server
  namespace: roma-system
  labels:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: api-server
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: roma-execution-bridge
    app.kubernetes.io/component: api-server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: roma-api-server-pdb
  namespace: roma-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: roma-execution-bridge
      app.kubernetes.io/component: api-server
