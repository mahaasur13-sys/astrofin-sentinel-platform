# cert-manager Helm values
# Usage: helm install cert-manager jetstack/cert-manager -f values.yaml -n cert-manager

installCRDs: false  # CRDs managed separately via kustomize (cert-manager.crds.yaml)

global:
  leaderElection:
    namespace: cert-manager

replicas: 2

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  runAsGroup: 1001

startupapicheck:
  enabled: false

monitoring:
  enabled: true
  ServiceMonitor:
    enabled: true

# Pod anti-affinity for HA
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - cert-manager
                  - cert-manager-cainjector
                  - cert-manager-webhook
          topologyKey: kubernetes.io/hostname

# Pod disruption budget
podDisruptionBudget:
  minAvailable: 1

# Liveness/readiness probes
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 8

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3