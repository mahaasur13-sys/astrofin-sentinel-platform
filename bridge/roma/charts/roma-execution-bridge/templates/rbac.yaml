{{/*
RBAC for ROMA Executor
*/}}
{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
rules:
  - apiGroups: ["roma.ai"]
    resources: ["romatasks"]
    verbs: [get, list, watch, patch, update]
  - apiGroups: ["roma.ai"]
    resources: ["romatasks/status"]
    verbs: [get, patch, update]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, get, list, patch, watch]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: [get, list]
  - apiGroups: [""]
    resources: ["events"]
    verbs: [create, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.clusterRoleName }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
rules:
  - apiGroups: ["roma.ai"]
    resources: ["romatasks"]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, get, list, patch]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: [get, list]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: [get, list]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.rbac.serviceAccountName }}
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.rbac.clusterRoleName }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.rbac.clusterRoleName }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{/*
Network Policy
*/}}
{{- if .Values.network.policy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "roma-execution-bridge.fullname" . }}-allow-same-ns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roma-execution-bridge.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53  # DNS
        - protocol: UDP
          port: 53
    - to:
        - podSelector: {}
{{- end }}
