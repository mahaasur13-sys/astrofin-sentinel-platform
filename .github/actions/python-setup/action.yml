name: Python Setup (Composite, uv)

description: 'Reusable composite action: setup Python 3.12 with uv + lock-based caching'

# Replaces the legacy pip + requirements*.txt flow. uv.lock is the single
# source of truth for transitive resolution.
# Usage:
#   - uses: actions/checkout@v4
#   - uses: ./.github/actions/python-setup/action.yml
#     with:
#       python-version: '3.12'
#       install-dev: 'true'

inputs:
  python-version:
    description: 'Python version to install'
    required: false
    default: '3.12'
  install-dev:
    description: 'Install dev dependencies (pytest, ruff, mypy, etc.)'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.6.14"

    - name: Setup Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
        restore-keys: |
          uv-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.install-dev }}" = "true" ]; then
          uv sync --frozen --extra dev
        else
          uv sync --frozen
        fi
        # KI-125/126: explicitly point VIRTUAL_ENV at the project .venv so
        # subsequent `uv run` invocations reuse the dev dependencies that
        # `uv sync --extra dev` just installed here. The previous
        # `uv venv --relocatable` form was a no-op (flag does not exist on
        # `uv venv`), which left VIRTUAL_ENV empty and made `uv run` spin
        # up an ephemeral env that did not contain pytest.
        echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
        echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
