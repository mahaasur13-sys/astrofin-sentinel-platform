name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (flake8 + bandit)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit radon
      - name: flake8 (non-blocking during bootstrap)
        run: |
          echo "::group::flake8"
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,venv,__pycache__,.git,.pytest_cache,.ruff_cache,.mypy_cache,docs,bridge/roma/roma_sdk.py,infrastructure/asurdev/v6/digital_twin/simulator.py \
            || echo "::warning::flake8 found issues (non-blocking)"
          flake8 . --count --max-complexity=10 --max-line-length=120 --statistics \
            --exclude=.venv,venv,__pycache__,.git,.pytest_cache,.mypy_cache,.ruff_cache \
            || echo "::warning::flake8 style issues (non-blocking)"
          echo "::endgroup::"
      - name: bandit (non-blocking)
        run: |
          bandit -r . -ll -ii -x .venv,venv,__pycache__,.git,.pytest_cache,tests \
            --skip B101 \
            || echo "::warning::bandit findings (non-blocking)"

  test:
    name: Tests (smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx pyyaml pydantic>=2.0 fastapi uvicorn click rich requests
      - name: pytest collect-only
        run: |
          pytest --collect-only -q --co -p no:cacheprovider tests/ 2>&1 | tail -40 \
            || echo "::warning::collect issues (non-blocking)"
      - name: pytest smoke
        run: |
          pytest -q --tb=short --no-header \
            --ignore=tests/e2e \
            --ignore=tests/ralph_benchmark \
            --ignore=tests/observability \
            --ignore=tests/architecture \
            --ignore=tests/data_room \
            -p no:cacheprovider 2>&1 | tail -60 \
            || echo "::warning::Some tests failed (non-blocking during bootstrap)"
