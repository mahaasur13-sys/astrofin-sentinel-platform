name: CI

# AstroFin Sentinel V5 - main CI pipeline.
# Phase 1+2: triggers, concurrency, shared Python setup,
# 4 architecture jobs (kn-ignore, lint, validate, registry),
# summary, PR comment in Russian.
#
# Hard-fail (block merge): architecture-lint, registry-check, validate-agents.
# Soft (exit 2): registry-warn.

on:
  pull_request:
    branches: [ master, develop, 'phase*', 'feat/**', 'fix/**' ]
  push:
    branches: [ master, develop ]
  workflow_call:

# Cancel in-progress runs for the same PR on new push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ---- Phase 1 helper: parse KNOWN_ISSUES.md once, expose to all jobs. ----
  known-issues:
    name: Parse KNOWN_ISSUES.md
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.parse.outputs.count }}
      json: ${{ steps.parse.outputs.json }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - id: parse
        name: Parse docs/KNOWN_ISSUES.md
        run: |
          python scripts/parse_known_issues.py > /tmp/ki.json
          count=$(python -c 'import json,sys; print(len(json.load(open("/tmp/ki.json"))))')
          echo 'count='$count >> $GITHUB_OUTPUT
          json=$(cat /tmp/ki.json)
          echo 'json<<EOF' >> $GITHUB_OUTPUT
          echo "$json" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
      - name: Upload ki.json artifact
        uses: actions/upload-artifact@v4
        with: { name: known-issues, path: /tmp/ki.json, retention-days: 7 }

  # ---- Phase 2 Job 1: architecture linter (R1-R9 hard, soft warnings exit 2). ----
  architecture-lint:
    name: Architecture Lint (R1-R9)
    needs: known-issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run architecture linter (R1-R9)
        run: |
          set +e
          python scripts/architecture_linter.py > /tmp/lint.out 2>&1
          rc=$?
          set -e
          cat /tmp/lint.out
          echo 'lint-exit-code='$rc >> $GITHUB_OUTPUT
          # Skip violations linked to KI-xxx entries (Phase 6).
          ki=${{ needs.known-issues.outputs.json }}
          echo "$ki" | python -c "import json,sys,re;" \
            "items=json.load(sys.stdin);\n" \
            "import os;\n" \
            "src=open('/tmp/lint.out').read();\n" \
            "out=src;\n" \
            "for it in items:\n" \
            "  paths=it.get('paths',[]);\n" \
            "  for p in paths:\n" \
            "    out=re.sub(r'(?m)^.*'+re.escape(p)+r'.*R\d+.*$','',out);\n" \
            "open('/tmp/lint.filtered.out','w').write(out)"
          # Hard fail (exit 1) blocks merge. Soft (exit 2) does not.
          if [ $rc -eq 1 ]; then exit 1; fi
          exit 0
      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: architecture-lint, path: /tmp/lint.out, retention-days: 14 }

  # ---- Phase 2 Job 2: validate each changed agent (A1-A9). ----
  validate-agents:
    name: Validate Changed Agents (A1-A9)
    needs: [ known-issues ]
    if: contains(github.event.pull_request.changed_files || '', 'agents/_impl/') || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Detect changed agent files
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base=${{ github.event.pull_request.base.sha }}
            git fetch origin $base --depth=1
            changed=$(git diff --name-only origin/$base...HEAD -- 'agents/_impl/*.py' | grep -v _archived || true)
          else
            changed=$(git diff --name-only HEAD~1 -- 'agents/_impl/*.py' | grep -v _archived || true)
          fi
          echo "$changed" > /tmp/changed_agents.txt
          count=$(echo "$changed" | grep -c . || true)
          echo 'count='$count >> $GITHUB_OUTPUT
          echo 'list<<EOF' >> $GITHUB_OUTPUT
          echo "$changed" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
      - name: Run validate_agent.py on each
        if: steps.detect.outputs.count > 0
        run: |
          fail=0
          while read f; do
            [ -z "$f" ] && continue
            echo '--- validating '$f' ---'
            python scripts/validate_agent.py "$f" > /tmp/validate.out 2>&1 || true
            cat /tmp/validate.out
            if grep -qE 'checks passed\.\s+0 failed' /tmp/validate.out; then
              :
            fi
            if ! grep -qE 'Ready to ship' /tmp/validate.out; then
              fail=1
            fi
          done < /tmp/changed_agents.txt
          exit $fail
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: validate-agents-log, path: /tmp/validate.out, retention-days: 14 }

  # ---- Phase 2 Job 3: registry-coverage check (CI version, hard fail). ----
  registry-check:
    name: Registry Coverage (CI strict)
    if: contains(github.event.pull_request.changed_files || '', 'agents/_impl/') || contains(github.event.pull_request.changed_files || '', 'agents/gitagent_registry.py')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run registry coverage check (strict)
        run: |
          set +e
          python scripts/validate_registry.py --strict --ci
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo '::error::registry-coverage failed (exit '$rc')'
            exit $rc
          fi

  # ---- Phase 6: pip-audit vulnerability scan. ----
  security-audit:
    name: Security Audit (pip-audit)
    needs: [ known-issues ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
      - name: Run pip-audit (strict)
        run: |
          set +e
          pip-audit --strict --requirement dev-requirements.txt > /tmp/audit.out 2>&1
          rc=$?
          set -e
          cat /tmp/audit.out
          if [ $rc -ne 0 ]; then
            echo '::error::pip-audit found vulnerabilities (exit '$rc')'
            exit $rc
          fi
      - name: Upload audit output
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: security-audit, path: /tmp/audit.out, retention-days: 14 }

  # ---- Phase 5: write summary to $GITHUB_STEP_SUMMARY. ----
  summary:
    name: Summary
    needs: [ known-issues, architecture-lint, registry-check, security-audit ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - name: Write summary to GITHUB_STEP_SUMMARY
        run: |
          status() { if [ "$1" = "success" ]; then echo '- '"$2"': OK'; else echo '- '"$2"': FAIL ('"$1"')'; fi; }
          echo '## CI Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '### Architecture' >> $GITHUB_STEP_SUMMARY
          status "${{ needs.architecture-lint.result }}" "architecture-lint (R1-R9)" >> $GITHUB_STEP_SUMMARY
          status "${{ needs.registry-check.result }}" "registry-coverage (CI strict)" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '### Security' >> $GITHUB_STEP_SUMMARY
          status "${{ needs.security-audit.result }}" "pip-audit (strict)" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '### Docs' >> $GITHUB_STEP_SUMMARY
          echo '- KNOWN_ISSUES.md: '${{ needs.known-issues.outputs.count }}' entries parsed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See AGENTS.md and KNOWN_ISSUES.md for details.' >> $GITHUB_STEP_SUMMARY

  # ---- Phase 5: PR comment in Russian. ----
  pr-comment:
    name: PR Comment (RU)
    needs: [ known-issues, architecture-lint, registry-check, security-audit ]
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - name: Post/update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- astrofin-ci-bot -->';
            const a = '${{ needs.architecture-lint.result }}';
            const r = '${{ needs.registry-check.result }}';
            const s = '${{ needs.security-audit.result }}';
            const ki = '${{ needs.known-issues.outputs.count }}';
            const p1 = []; const p2 = [];
            if (a === 'success') p2.push('Architecture lint (R1-R9): OK');
            else p1.push('Architecture lint (R1-R9): FAILED (' + a + ')');
            if (r === 'success') p2.push('Registry coverage: OK');
            else p1.push('Registry coverage: FAILED (' + r + ')');
            if (s === 'success') p2.push('pip-audit (strict): OK');
            else p1.push('pip-audit (strict): FAILED (' + s + ')');
            const body = marker + '\n## AstroFin CI\n' +
              '**KNOWN_ISSUES:** ' + ki + ' entries\n\n' +
              '### P1 (блокирующие)\n' + (p1.length ? p1.map(x => '- ' + x).join('\n') : '_нет_') + '\n\n' +
              '### P2 (информационные)\n' + (p2.length ? p2.map(x => '- ' + x).join('\n') : '_нет_') + '\n';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body });
            }

