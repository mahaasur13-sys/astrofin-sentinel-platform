name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (flake8 + bandit)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit radon

      - name: flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,venv,__pycache__,.git
          flake8 . --count --max-complexity=10 --max-line-length=120 --statistics \
            --exclude=.venv,venv,__pycache__,.git,.pytest_cache,.mypy_cache,.ruff_cache \
            || echo "::warning::flake8 complexity/length issues found (non-blocking)"

      - name: bandit (security)
        run: |
          bandit -r . -ll -ii -x .venv,venv,tests,__pycache__,.git,.pytest_cache \
            --skip B101 || echo "::warning::bandit non-blocking findings"

      - name: radon (maintainability)
        run: |
          radon cc . -s -a -n C -exclude=.venv,venv,tests,__pycache__,.git \
            | tee /tmp/radon.txt
          radon mi . -s -n B -exclude=.venv,venv,tests,__pycache__,.git \
            | tee /tmp/radon-mi.txt

  test:
    name: Tests (pytest collect)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx pyyaml
          # Project optional deps are best-effort; tests must collect
          pip install --no-deps -e . 2>/dev/null || true

      - name: pytest --collect-only
        run: |
          pytest --collect-only -q --co -p no:cacheprovider 2>&1 | tail -50

      - name: pytest quick
        run: |
          pytest -q --tb=short --no-header -x \
            --ignore=tests/e2e \
            --ignore=tests/ralph_benchmark \
            --ignore=tests/observability \
            --ignore=tests/architecture \
            --ignore=tests/data_room \
            -p no:cacheprovider 2>&1 | tail -80 || \
            echo "::warning::Some tests failed (non-blocking during bootstrap)"