name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      strict:
        description: "Run linters in strict mode (no continue-on-error)"
        required: false
        default: "false"
        type: boolean

# Default minimal permissions; individual jobs widen as needed.
permissions:
  contents: read

# Cancel in-progress runs for the same ref on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # -------------------------------------------------------------------------
  # 1. Architecture linter (custom) — fastest signal, runs first.
  # -------------------------------------------------------------------------
  architecture-lint:
    name: Architecture linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - name: Run architecture linter
        run: |
          python3 scripts/architecture_linter.py

  # -------------------------------------------------------------------------
  # 2. Linters: ruff (fast) + flake8 (style) + bandit (security) + radon (CC).
  # -------------------------------------------------------------------------
  lint:
    name: Lint (ruff + flake8 + bandit + radon)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: ${{ github.event.inputs.strict != 'true' && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8 bandit radon
      - name: ruff
        run: |
          ruff check . --output-format=github
      - name: flake8 (syntax/compile errors only)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,venv,__pycache__,.git,.pytest_cache,.ruff_cache,.mypy_cache
      - name: bandit (security)
        run: |
          bandit -r . -ll -ii \
            -x .venv,venv,__pycache__,.git,.pytest_cache,tests,build,dist \
            --skip B101 \
            -f json -o bandit-report.json || true
      - name: radon (cyclomatic complexity, informational)
        run: |
          radon cc . -a -s -n C \
            -e .venv,venv,__pycache__,.git,.pytest_cache,build,dist,*.egg-info \
            > radon-cc.txt 2>&1 || true
          echo "Top 10 highest CC functions:"
          radon cc . -s -n C \
            -e .venv,venv,__pycache__,.git,.pytest_cache,build,dist,*.egg-info 2>/dev/null \
            | head -n 30 || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            bandit-report.json
            radon-cc.txt
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # 3. Unit tests — quick smoke that should always pass.
  # -------------------------------------------------------------------------
  test-unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-cov pytest-xdist \
                      httpx pyyaml pydantic>=2.0 fastapi uvicorn \
                      click rich requests aiohttp
      - name: pytest (unit + smoke)
        env:
          SENTINEL_METRICS_ENABLED: "0"
        run: |
          pytest -q --tb=short --no-header \
            --ignore=tests/e2e \
            --ignore=tests/ralph_benchmark \
            --ignore=tests/observability \
            --ignore=tests/architecture \
            --ignore=tests/data_room \
            -p no:cacheprovider \
            -m "not integration and not slow" \
            --maxfail=20
      - name: pytest (collect-only check, integration tests too)
        env:
          SENTINEL_METRICS_ENABLED: "0"
        run: |
          pytest --collect-only -q --co -p no:cacheprovider \
            -p "ignore::pytest.PytestUnknownMarkWarning" \
            2>&1 | tail -20

  # -------------------------------------------------------------------------
  # 4. Sub-package tests (bridge, kernel).
  # -------------------------------------------------------------------------
  test-subpackages:
    name: Sub-package tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: bridge/roma
            dir: bridge/roma
          - label: kernel/atom-federation
            dir: kernel/atom-federation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx pyyaml pydantic>=2.0 fastapi uvicorn jinja2
          ls ${{ matrix.dir }} 2>&1 | head -3 || true
      - name: pytest (collect-only)
        working-directory: ${{ matrix.dir }}
        run: |
          if [ -d tests ] || [ -d saas ]; then
            find . -name "test_*.py" -not -path "*/build/*" -print0 \
              | xargs -0 pytest --collect-only -q -p no:cacheprovider 2>&1 | tail -20 \
              || echo "::warning::collect issues in ${{ matrix.dir }}"
          fi

  # -------------------------------------------------------------------------
  # 5. Meta-RL persistence test (uses tempdir, no network).
  # -------------------------------------------------------------------------
  test-meta-rl:
    name: Meta-RL persistence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install pydantic>=2.0 pyyaml
      - name: Smoke-import meta_rl package
        env:
          SENTINEL_METRICS_ENABLED: "0"
        run: |
          python -c "import meta_rl; print('meta_rl import OK:', meta_rl.__file__)"
          python -c "from meta_rl.persistence import PersistenceStore; print('PersistenceStore OK')" \
            || echo "::warning::meta_rl persistence import failed"

  # -------------------------------------------------------------------------
  # 6. Validate data room structure.
  # -------------------------------------------------------------------------
  data-room:
    name: Validate data room
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - name: Validate
        run: |
          bash scripts/ci_validate_data_room.sh

  # -------------------------------------------------------------------------
  # 7. Required status check aggregator.
  # -------------------------------------------------------------------------
  status:
    name: Status
    runs-on: ubuntu-latest
    needs:
      - architecture-lint
      - lint
      - test-unit
      - data-room
    if: always()
    steps:
      - name: Check upstream
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed (lint/test-unit may be allowed to fail in PR bootstrap mode)."
