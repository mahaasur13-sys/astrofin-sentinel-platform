name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (flake8 + bandit)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

      - name: flake8 syntax check (blocking)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,venv,__pycache__,.git,.pytest_cache,.mypy_cache,.ruff_cache

      - name: flake8 style (non-blocking during bootstrap)
        run: |
          flake8 . --count --max-complexity=10 --max-line-length=120 --statistics \
            --exclude=.venv,venv,__pycache__,.git,.pytest_cache,.mypy_cache,.ruff_cache \
            || true

      - name: bandit (non-blocking)
        run: |
          bandit -r . -ll -x .venv,venv,tests,__pycache__,.git,.pytest_cache \
            --skip B101 \
            || true

  test:
    name: Tests (smoke)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install smoke deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx pyyaml

      - name: pytest --collect-only
        continue-on-error: true
        run: |
          pytest --collect-only -q -p no:cacheprovider 2>&1 | tail -50

      - name: pytest smoke (selected)
        continue-on-error: true
        run: |
          pytest -q --tb=line --no-header \
            -p no:cacheprovider \
            --ignore=tests/e2e \
            --ignore=tests/ralph_benchmark \
            --ignore=tests/observability \
            --ignore=tests/architecture \
            --ignore=tests/data_room \
            2>&1 | tail -80 || true
