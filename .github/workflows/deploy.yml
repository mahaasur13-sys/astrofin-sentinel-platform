name: CD — Build, Sign, Deploy

# Continuous Delivery pipeline.
#
# Flow:
#   1. push tag v*.*.*  -> build + sign + push image to GHCR
#   2. deploy-staging   -> kubectl apply to staging cluster (environment: staging)
#   3. smoke-test       -> curl /healthz on staging service
#   4. deploy-prod      -> kubectl apply to prod cluster (environment: production, requires approval)
#
# Required secrets (configure at repo or environment level):
#   - GHCR_USERNAME / GHCR_TOKEN (or rely on secrets.GITHUB_TOKEN with packages: write)
#   - KUBE_CONFIG_STAGING (base64-encoded kubeconfig for staging)
#   - KUBE_CONFIG_PROD     (base64-encoded kubeconfig for production)
#   - COSIGN_PRIVATE_KEY   (cosign.key contents)
#   - COSIGN_PASSWORD      (passphrase for the cosign key)
#   - STAGING_HEALTH_URL   (e.g. https://staging.astrofin.example/healthz)
#   - PROD_HEALTH_URL      (e.g. https://astrofin.example/healthz)
#
# Image registry: ghcr.io/mahaasur13-sys/astrofin-sentinel-platform
#
# Tag strategy:
#   - ${VERSION} (from git tag, e.g. v1.2.3)
#   - latest
#   - ${VERSION}-sha-${SHORT_SHA}

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version tag (e.g. v1.2.3). Skips staging + prod auto-deploy.'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write   # for cosign keyless (optional, see below)
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build, sign, push
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build, Sign & Push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image:   ${{ steps.meta.outputs.image }}
      digest:  ${{ steps.build.outputs.digest }}
      sbom:    ${{ steps.sbom.outputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          with:
            submodules: recursive
            token: ${{ secrets.GH_PAT }}
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          SHORT_SHA="$(git rev-parse --short HEAD)"
          IMAGE="${REGISTRY}/${IMAGE_OWNER}/${IMAGE_NAME##*/}"
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}"      >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "::group::Image metadata"
          echo "version : ${VERSION}"
          echo "image   : ${IMAGE}"
          echo "::endgroup::"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch manifest, multi-tag)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}-sha-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=AstroFin Sentinel Platform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true
          sbom: true

      - name: Extract digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            --raw | sha256sum | awk '{print $1}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          # also write for next step
          echo "${DIGEST}" > /tmp/image.digest

      # -------------------------- SBOM --------------------------
      - name: Generate SBOM (syft)
        id: sbom
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          artifact-name: astrofin-sbom.spdx.json

      # ------------------------- Cosign sign -------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (key-based)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD:   ${{ secrets.COSIGN_PASSWORD }}
          IMAGE:             ${{ steps.meta.outputs.image }}
          VERSION:           ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${COSIGN_PRIVATE_KEY}" ]; then
            echo "::error::COSIGN_PRIVATE_KEY is empty — refusing to sign."
            exit 1
          fi
          echo "${COSIGN_PRIVATE_KEY}" > cosign.key
          chmod 0600 cosign.key
          cosign sign --key cosign.key --yes \
            "${IMAGE}:${VERSION}"
          cosign sign --key cosign.key --yes \
            "${IMAGE}:${VERSION}-sha-${{ steps.meta.outputs.short_sha }}"
          cosign sign --key cosign.key --yes \
            "${IMAGE}:latest"
          # cleanup key from runner
          shred -u cosign.key || rm -f cosign.key

      - name: Verify signature
        env:
          IMAGE:   ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # We need the public key to verify. As a fallback, we use the transparency log.
          cosign verify \
            --certificate-identity-regexp 'https://github.com/.*' \
            --certificate-oidc-issuer-regexp 'https://token.actions.githubusercontent.com' \
            "${IMAGE}:${VERSION}" \
            || echo "::warning::Keyless verification failed (expected if using key-based signing)."

  # ---------------------------------------------------------------------------
  # 2. Deploy to staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy → staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_HEALTH_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          with:
            submodules: recursive
            token: ${{ secrets.GH_PAT }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render manifests with new image tag
        env:
          IMAGE:   ${{ needs.build-and-push.outputs.image }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          set -euo pipefail
          # In-place substitution of the image tag in deploy/k8s/deployment.yaml
          sed -i.bak \
            -E "s|(image:.*ghcr\.io/mahaasur13-sys/astrofin-sentinel-web:).*|\1${VERSION}|g" \
            deploy/k8s/deployment.yaml
          rm -f deploy/k8s/deployment.yaml.bak
          echo "Patched image tag:"
          grep '^[[:space:]]*image:' deploy/k8s/deployment.yaml | head -5

      - name: Apply manifests
        env:
          KUBECONFIG_B64: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          set -euo pipefail
          echo "${KUBECONFIG_B64}" | base64 -d > kubeconfig
          export KUBECONFIG="${PWD}/kubeconfig"
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -n astrofin-sentinel -f deploy/k8s/

      - name: Wait for rollout
        env:
          KUBECONFIG_B64: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          set -euo pipefail
          echo "${KUBECONFIG_B64}" | base64 -d > kubeconfig
          export KUBECONFIG="${PWD}/kubeconfig"
          kubectl rollout status deployment/astrofin-sentinel-web \
            -n astrofin-sentinel --timeout=5m

  # ---------------------------------------------------------------------------
  # 3. Smoke test
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke test (staging /healthz)
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Healthcheck
        env:
          URL: ${{ vars.STAGING_HEALTH_URL }}
        run: |
          set -euo pipefail
          if [ -z "${URL}" ]; then
            echo "::error::STAGING_HEALTH_URL is not set."
            exit 1
          fi
          for i in {1..10}; do
            code=$(curl -sS -o /tmp/hc.body -w "%{http_code}" "${URL}" || echo "000")
            echo "attempt ${i}: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "✅ staging healthz OK"
              cat /tmp/hc.body
              exit 0
            fi
            sleep 5
          done
          echo "::error::staging healthcheck never returned 200"
          cat /tmp/hc.body || true
          exit 1

  # ---------------------------------------------------------------------------
  # 4. Deploy to production (gated)
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy → production
    needs: [build-and-push, smoke-test]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PROD_HEALTH_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          with:
            submodules: recursive
            token: ${{ secrets.GH_PAT }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render manifests with new image tag
        env:
          IMAGE:   ${{ needs.build-and-push.outputs.image }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          set -euo pipefail
          sed -i.bak \
            -E "s|(image:.*ghcr\.io/mahaasur13-sys/astrofin-sentinel-web:).*|\1${VERSION}|g" \
            deploy/k8s/deployment.yaml
          rm -f deploy/k8s/deployment.yaml.bak

      - name: Verify cosign signature on production image
        env:
          IMAGE:   ${{ needs.build-and-push.outputs.image }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          cosign verify --key cosign.pub "${IMAGE}:${VERSION}" \
            || (echo "::error::Image signature verification FAILED — refusing to deploy."; exit 1)

      - name: Apply manifests
        env:
          KUBECONFIG_B64: ${{ secrets.KUBE_CONFIG_PROD }}
        run: |
          set -euo pipefail
          echo "${KUBECONFIG_B64}" | base64 -d > kubeconfig
          export KUBECONFIG="${PWD}/kubeconfig"
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -n astrofin-sentinel -f deploy/k8s/

      - name: Wait for rollout
        env:
          KUBECONFIG_B64: ${{ secrets.KUBE_CONFIG_PROD }}
        run: |
          set -euo pipefail
          echo "${KUBECONFIG_B64}" | base64 -d > kubeconfig
          export KUBECONFIG="${PWD}/kubeconfig"
          kubectl rollout status deployment/astrofin-sentinel-web \
            -n astrofin-sentinel --timeout=10m

      - name: Post-deploy healthcheck
        env:
          URL: ${{ vars.PROD_HEALTH_URL }}
        run: |
          set -euo pipefail
          for i in {1..15}; do
            code=$(curl -sS -o /tmp/hc.body -w "%{http_code}" "${URL}" || echo "000")
            if [ "${code}" = "200" ]; then
              echo "✅ production healthz OK"
              exit 0
            fi
            sleep 4
          done
          echo "::error::production healthcheck never returned 200"
          exit 1