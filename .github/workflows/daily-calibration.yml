name: Daily Meta-RL Calibration

on:
  schedule:
    # Каждый день в 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Ручной запуск из GitHub UI

jobs:
  calibrate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TRADING_MODE: PAPER
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Calibration
        run: |
          python tools/run_daily_calibration.py

      - name: Commit updated weights
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/agent_weights.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No weight changes to commit"
          else
            git commit -m "calibration: daily agent weight update [skip ci]"
            git push
          fi
