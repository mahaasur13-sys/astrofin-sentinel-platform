name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: read
jobs:
  flake8:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: |
          flake8 --version
          # Exclude venvs, builds, caches
          flake8 --max-line-length=120 --extend-ignore=E203,W503 \
            --exclude=build,dist,.venv,venv,*_pb2.py,*egg-info \
            --count --statistics .
  bandit:
    name: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit --version
          bandit -r . -f json -o bandit-report.json || true
          # Always upload even if issues found; fail if high severity
          bandit -r . -ll
  radon:
    name: radon (CC + MI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install radon
      - name: Cyclomatic complexity
        run: |
          radon cc -s -a .
      - name: Maintainability index
        run: |
          radon mi -s .
      - name: Raw metrics summary
        run: |
          radon raw -s .
