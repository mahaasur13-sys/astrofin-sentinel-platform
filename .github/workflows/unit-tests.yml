name: unit-tests

# Phase 4.2.5 — pytest + bandit on every PR.
# Soft gate: failures block merge via the existing "PR Checks" branch protection.
# Tests run with --no-cov first (fast feedback), then a coverage pass that
# uploads the XML artifact for downstream jobs.

on:
  pull_request:
    branches: [ master, develop, 'phase*', 'feat/**', 'fix/**' ]
  push:
    branches: [ master, develop ]
  workflow_call:

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  REQUIRE_AUTH: 'true'
  API_KEY: 'ci-dummy-key'

jobs:
  pytest-fast:
    name: pytest (unit + auth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '3.12', cache: 'pip' }
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r dev-requirements.txt
      - name: Generate RSA keypair for JWT tests
        run: |
          mkdir -p keys
          python -c "
          from cryptography.hazmat.primitives.asymmetric import rsa
          from cryptography.hazmat.primitives import serialization
          k = rsa.generate_private_key(public_exponent=65537, key_size=2048)
          (k.private_bytes(serialization.Encoding.PEM,
                           serialization.PrivateFormat.PKCS8,
                           serialization.NoEncryption())
           .__class__(b''))  # noop
          priv = k.private_bytes(serialization.Encoding.PEM,
                                 serialization.PrivateFormat.PKCS8,
                                 serialization.NoEncryption())
          pub  = k.public_key().public_bytes(serialization.Encoding.PEM,
                                             serialization.PublicFormat.SubjectPublicKeyInfo)
          open('keys/jwt_private.pem','wb').write(priv)
          open('keys/jwt_public.pem','wb').write(pub)
          "
      - name: Run unit + auth tests (no cov)
        run: |
          python -m pytest tests/auth tests/test_auth_empty_key.py tests/test_auth_flask_decorator.py \
            -p no:cacheprovider --no-cov --no-header -q
      - name: Run wider unit suite (with coverage, soft gate)
        continue-on-error: true
        run: |
          python -m pytest tests/ -p no:cacheprovider --no-header -q \
            --cov=core --cov=src/bridges/roma/scheduler \
            --cov-report=xml:coverage.xml -x
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  bandit:
    name: bandit (security lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '3.12', cache: 'pip' }
      - name: Install bandit
        run: pip install 'bandit>=1.9.4'
      - name: Run bandit on core + roma scheduler (high severity only)
        run: |
          mkdir -p /tmp/bandit
          bandit -r core/ src/bridges/roma/scheduler -f json -o /tmp/bandit/r.json -lll || true
          bandit -r core/ src/bridges/roma/scheduler -f txt -o /tmp/bandit/r.txt -lll || true
          echo "---- summary ----"
          python -c "import json; d=json.load(open('/tmp/bandit/r.json')); print('issues:', len(d.get('results',[])))"
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: /tmp/bandit/
          retention-days: 7

  summary:
    name: Unit Tests Summary
    needs: [ pytest-fast, bandit ]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## Unit Tests + Bandit"
            echo ""
            status() { if [ "$1" = "success" ]; then echo "- ✅ $2: OK"; else echo "- ❌ $2: FAIL"; fi; }
            status "${{ needs.pytest-fast.result }}" "pytest"
            status "${{ needs.bandit.result }}" "bandit"
          } >> "$GITHUB_STEP_SUMMARY"
