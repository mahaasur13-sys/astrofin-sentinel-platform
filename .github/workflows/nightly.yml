name: Nightly

on:
  schedule:
    # Every day at 03:17 UTC.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      report_only:
        description: "Only run DORA report, skip heavy tests"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"

jobs:
  # -------------------------------------------------------------------------
  # DORA metrics — deployed on schedule, uploaded as artifact, optionally
  # committed back to docs/ by a follow-up job.
  # -------------------------------------------------------------------------
  dora:
    name: DORA metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Generate DORA report
        run: |
          python3 scripts/dora_metrics.py --window 30 \
            --out docs/operations/dora_latest.json || \
            echo "::warning::DORA report incomplete"
      - name: Upload DORA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dora-report
          path: docs/operations/dora_latest.json
          retention-days: 90
      - name: Commit DORA report (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/operations/dora_latest.json; then
            echo "No changes to DORA report."
          else
            git add docs/operations/dora_latest.json
            git commit -m "chore(ops): nightly DORA report $(date -u +%Y-%m-%d)"
            git push || echo "::warning::DORA push failed (likely insufficient permissions)"
          fi

  # -------------------------------------------------------------------------
  # Heavy tests (full suite, integration, e2e subset) — only if not report_only.
  # -------------------------------------------------------------------------
  test-full:
    name: Full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: dora
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.report_only != 'true' || github.event_name == 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-cov pytest-xdist \
                      httpx pyyaml pydantic>=2.0 fastapi uvicorn \
                      click rich requests aiohttp
      - name: Full pytest
        env:
          SENTINEL_METRICS_ENABLED: "0"
        run: |
          pytest -q --tb=short --no-header \
            -p no:cacheprovider \
            --ignore=tests/ralph_benchmark \
            --maxfail=50 \
            -m "not slow" 2>&1 | tail -80 || \
            echo "::warning::some tests failed (nightly report only)"
      - name: Upload coverage
        if: always()
        run: |
          pip install coverage pytest-cov 2>&1 | tail -2
          pytest -q --tb=no -p no:cacheprovider \
            --co --cov=. --cov-report=xml --cov-config=/dev/null \
            -m "not slow" 2>&1 | tail -10 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Dependabot group summary (informational).
  # -------------------------------------------------------------------------
  dependabot-summary:
    name: Dependabot summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule'
    steps:
      - name: List open dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --label "dependencies" --state open --json number,title,author,url \
            | jq -r '.[] | "\(.number) \(.title) by \(.author.login)"' \
            | head -50 || echo "::warning::gh pr list failed"

  # -------------------------------------------------------------------------
  # Notifier — post a summary digest if anything notable.
  # -------------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      - dora
      - test-full
      - dependabot-summary
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "### Nightly summary" >> $GITHUB_STEP_SUMMARY
          echo "- DORA: ${{ needs.dora.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Full tests: ${{ needs.test-full.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependabot summary: ${{ needs.dependabot-summary.result }}" >> $GITHUB_STEP_SUMMARY
