name: Project Board Lint

on:
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, milestoned, demilestoned]
  pull_request:
    types: [opened, closed]
  schedule:
    # Каждое воскресенье 23:00 UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  check-issue-format:
    name: Validate issue structure
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Только для issue (не PR)
          if [ "${{ github.event_name }}" != "issues" ]; then
            echo "Not an issue event, skipping"
            exit 0
          fi

          ISSUE_LABELS='${{ join(github.event.issue.labels.*.name, ",") }}'
          MISSING=""

          # 1. Phase label required
          if ! echo "$ISSUE_LABELS" | grep -qE "phase-[0-5]"; then
            MISSING="$MISSING phase-?"
          fi

          # 2. MoSCoW label required
          if ! echo "$ISSUE_LABELS" | grep -qE "^(must|should|could|wont)$"; then
            MISSING="$MISSING moscow"
          fi

          # 3. Area label required (одна из 5)
          if ! echo "$ISSUE_LABELS" | grep -qE "area/(backend|devops|security|docs|qa)"; then
            MISSING="$MISSING area"
          fi

          if [ -n "$MISSING" ]; then
            echo "❌ Missing required labels:$MISSING"
            echo "See: PRODUCTION_BACKLOG.md, MOSCOW_PRIORITIZATION.md, .github/ISSUE_TEMPLATE/production-task.md"
            exit 1
          fi

          echo "✅ All required labels present"

  weekly-audit:
    name: Weekly project audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Generate project report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 📊 Weekly Project Board Report" > report.md
          echo "" >> report.md
          echo "Generated: $(date -u +%Y-%m-%d\ %H:%M:%S) UTC" >> report.md
          echo "" >> report.md

          echo "### 🟥 MUST HAVE (open)" >> report.md
          gh issue list --label "must" --label "phase-0,phase-1,phase-2,phase-3,phase-4,phase-5" --state open --limit 100 --json number,title,labels,milestone 2>/dev/null | \
            jq -r '.[] | "- #\(.number) \(.title) [\(.milestone.title // "no milestone")]"' >> report.md || echo "(no issues)" >> report.md

          echo "" >> report.md
          echo "### 🚧 Blocked issues" >> report.md
          gh issue list --label "blocked" --state open --json number,title 2>/dev/null | \
            jq -r '.[] | "- #\(.number) \(.title)"' >> report.md || echo "(none)" >> report.md

          echo "" >> report.md
          echo "### ⏰ Stale (>7d no update)" >> report.md
          STALE_DATE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          gh issue list --state open --json number,title,updatedAt 2>/dev/null | \
            jq -r --arg stale "$STALE_DATE" '.[] | select(.updatedAt < $stale) | "- #\(.number) \(.title) (last update: \(.updatedAt))"' >> report.md || echo "(none)" >> report.md

          echo "" >> report.md
          echo "### 🎯 Milestone progress" >> report.md
          gh api graphql -f query='
            query($owner: String!, $name: String!) {
              repository(owner: $owner, name: $name) {
                milestones(first: 10, states: OPEN) {
                  nodes {
                    title
                    openIssues: issues(states: OPEN) { totalCount }
                    closedIssues: issues(states: CLOSED) { totalCount }
                    dueOn
                  }
                }
              }
            }
          ' -f owner="mahaasur13-sys" -f name="astrofin-sentinel-platform" | \
            jq -r '.data.repository.milestones.nodes[] | "- **\(.title)**: \(.openIssues.totalCount) open / \(.closedIssues.totalCount) closed, due \(.dueOn // "no date")"' >> report.md || echo "(query failed)" >> report.md

          cat report.md

      - name: Create/Update audit issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Найти существующий issue или создать новый
          EXISTING=$(gh issue list --label "project-audit" --state open --json number -q '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "Updating existing audit issue #$EXISTING"
            gh issue comment $EXISTING --body-file report.md
          else
            echo "Creating new audit issue"
            gh issue create \
              --title "📊 Weekly Project Board Audit — $(date -u +%Y-%m-%d)" \
              --body-file report.md \
              --label "project-audit,area/devops"
          fi
