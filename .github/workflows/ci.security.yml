  dep-vuln-scan:
    name: Dependency Vulnerability Scan (pip-audit + safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install pip-audit and safety
        run: pip install pip-audit==2.7.3 safety==3.2.3
      - name: pip-audit (requirements + requirements-dev)
        run: |
          set +e
          pip-audit -r requirements.txt -f json --disable-pip > /tmp/pip-audit.json 2>/tmp/pip-audit.err
          rc=$?
          cat /tmp/pip-audit.err
          # Re-emit final JSON with vulnerabilities only
          python -c "import json,sys; d=json.load(open('/tmp/pip-audit.json')); d=[x for x in d if x.get('vulns')]; open('/tmp/pip-audit.final.json','w').write(json.dumps(d,indent=2))"
          if [ "$rc" -ne 0 ] || [ -s /tmp/pip-audit.final.json ]; then
            echo "::error::pip-audit reported vulnerabilities"
            cat /tmp/pip-audit.final.json
            exit 1
          fi
      - name: safety check (requirements.txt)
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          set +e
          safety check -r requirements.txt --output text > /tmp/safety.out 2>&1
          safety_rc=$?
          cat /tmp/safety.out
          set -e
          if [ "$safety_rc" -ne 0 ]; then
            echo "::error::safety check reported vulnerabilities (rc=$safety_rc)"
            exit 1
          fi
      - name: Upload pip-audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: pip-audit-report, path: /tmp/pip-audit.final.json, retention-days: 14 }
      - name: Upload safety log
        dep-vuln-scan:
