name: Security

on:
  push:
    branches: [main, master]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - "scripts/architecture_linter.py"
  pull_request:
    branches: [main, master]
  schedule:
    # Mondays 06:00 UTC, after dependabot (which is also Monday).
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Bandit medium+ confidence
        run: |
          bandit -r . \
            -ll -ii \
            -x .venv,venv,__pycache__,.git,.pytest_cache,tests,build,dist \
            --format json --output bandit-report.json || true
          bandit -r . \
            -ll -ii \
            -x .venv,venv,__pycache__,.git,.pytest_cache,tests,build,dist \
            --skip B101
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14
        if: always()

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - name: Audit
        run: pip-audit --strict --requirement pyproject.toml || true
