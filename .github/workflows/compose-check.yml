name: Compose static check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize required submodules for compose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 home-cluster-iac roma-execution-bridge
          # Restore default URL rewrite so it doesn't leak into subsequent steps
          git config --global --unset-all url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config --quiet

      - name: Verify referenced Dockerfiles exist
        run: |
          # Extract all 'dockerfile:' paths from compose config
          docker compose -f docker-compose.yml config | grep -E '^\s+dockerfile:' | awk '{print $2}' | while read df; do
            if [ ! -f "$df" ]; then
              echo "ERROR: Dockerfile not found: $df"
              exit 1
            else
              echo "OK: $df"
            fi
          done
