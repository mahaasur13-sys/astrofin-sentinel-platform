name: Quality Gate

on:
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'agents/_impl/**'
      - 'core/**'
      - 'scripts/**'
      - 'docs/**'
      - '.github/workflows/**'

# Quality gate is a **blocking** job for changes in the agents/ tree.
# It enforces: linter, per-agent validator, coverage on changed files,
# and a "did you touch docs?" warning.

env:
  PYTHON_VERSION: '3.12'
  COVERAGE_FAIL_UNDER: '85'

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          pip install --break-system-packages \
            pytest pytest-asyncio pytest-cov httpx structlog \
            prometheus-client pydantic redis faiss-cpu numpy pandas \
            ruff bandit detect-secrets

      - name: Detect changes in agents/_impl/
        id: changed
        run: |
          {
            echo "changed_files<<EOF"
            git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -E '^(agents/_impl/|core/)' || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat <<< "${{ steps.changed.outputs.changed_files }}"

      - name: Lint changed files
        run: |
          ruff check agents/ core/ scripts/ --output-format=github

      - name: Architecture linter
        run: |
          python scripts/architecture_linter.py --fail-on error

      - name: Per-agent validation (loop)
        if: steps.changed.outputs.changed_files != ''
        run: |
          set -e
          for f in $(echo "${{ steps.changed.outputs.changed_files }}" | tr ' ' '\n' | grep '^agents/_impl/.*\.py$' || true); do
            echo "::group::Validate $f"
            python scripts/validate_agent.py "$f" --fail-on error
            echo "::endgroup::"
          done

      - name: Coverage on changed files
        if: steps.changed.outputs.changed_files != ''
        run: |
          python -m pytest tests/ -q --tb=short \
            --cov=agents --cov=core \
            --cov-report=term --no-header \
            --cov-fail-under=${{ env.COVERAGE_FAIL_UNDER }}

      - name: Doc-touch warning (informational)
        if: steps.changed.outputs.changed_files != ''
        run: |
          docs_changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(docs/|STATUS\.md|ARCHITECTURE\.md|CONTRIBUTING\.md)' | wc -l)
          impl_changed=$(echo "${{ steps.changed.outputs.changed_files }}" \
            | grep -E '^agents/_impl/' | wc -l)
          if [ "$impl_changed" -gt 0 ] && [ "$docs_changed" -eq 0 ]; then
            echo "::warning file=docs/STATUS.md::You changed agents/_impl/ but did not touch docs/. Please update docs/STATUS.md (and ARCHITECTURE.md if the contract changed)."
          fi
