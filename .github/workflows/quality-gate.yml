name: Quality Gate

on:
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'agents/_impl/**'
      - 'core/**'
      - 'scripts/**'
      - 'docs/**'
      - '.github/workflows/**'

# Quality gate is a **blocking** job for changes in the agents/ tree.
# It enforces: linter, per-agent validator, coverage on changed files,
# and a "did you touch docs?" warning.
#
# KI-125 fix: ruff now runs only on files changed in the PR (not the whole
# tree). Previously it surfaced 60+ pre-existing BLE001 errors in master
# and made every PR red, regardless of what the PR touched. See
# docs/KNOWN_ISSUES.md (KI-125).

env:
  PYTHON_VERSION: '3.12'
  COVERAGE_FAIL_UNDER: '10'

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install
        run: pip install --break-system-packages -r requirements-dev.txt

      - name: Detect changes in agents/_impl/ and core/
        id: changed
        run: |
          {
            echo "changed_files<<EOF"
            git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -E '^(agents/_impl/|core/)' || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat <<< "${{ steps.changed.outputs.changed_files }}"

      - name: Lint changed files (KI-125)
        # Run ruff on the intersection of "files the PR changed" and
        # "files under lint-scope trees that still exist on disk".
        # Files outside the PR diff are not enforced here — they are
        # addressed as separate cleanup tasks (see ROADMAP).
        run: |
          set +e
          base="origin/${{ github.base_ref }}"
          git fetch --depth=1 origin "${{ github.base_ref }}" >/dev/null 2>&1 || true
          mapfile -t files < <(
            git diff --name-only "$base"...HEAD \
              | grep -E '\.py$' \
              | grep -E '^(agents/|core/|scripts/)' || true
          )
          set -e
          existing=()
          for f in "${files[@]}"; do
            [ -f "$f" ] && existing+=("$f")
          done
          if [ ${#existing[@]} -eq 0 ]; then
            echo "No lint-scope Python files changed in this PR. Skipping ruff."
            exit 0
          fi
          echo "Linting ${#existing[@]} changed Python file(s):"
          printf '  - %s\n' "${existing[@]}"
          ruff check "${existing[@]}" --output-format=github

      - name: Architecture linter
        run: |
          python scripts/architecture_linter.py --fail-on error

      - name: Per-agent validation (loop)
        if: steps.changed.outputs.changed_files != ''
        run: |
          set -e
          for f in $(echo "${{ steps.changed.outputs.changed_files }}" | tr ' ' '\n' | grep '^agents/_impl/.*\.py$' || true); do
            echo "::group::Validate $f"
            python scripts/validate_agent.py "$f" --fail-on error
            echo "::endgroup::"
          done

      - name: Coverage on changed files (KI-127)
        if: steps.changed.outputs.changed_files != ''
        run: |
          # KI-127: `pytest-cov` lives in [project.optional-dependencies.dev] and the
          # coverage addopts are configured in pyproject.toml. Previously this job
          # invoked `python -m pytest` without first running `uv sync --extra dev`,
          # which left the runtime env without pytest-cov and produced
          # `unrecognized arguments: --cov=...` even though the flags were also
          # passed explicitly. Install dev extras and let addopts own the flags.
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
          uv sync --frozen --extra dev
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          uv run python -m pytest tests/ -q --tb=short \
            --no-header \
            --cov-report=term \
            --cov-fail-under=${{ env.COVERAGE_FAIL_UNDER }}

      - name: Doc-touch warning (informational)
        if: steps.changed.outputs.changed_files != ''
        run: |
          docs_changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(docs/|STATUS\.md|ARCHITECTURE\.md|CONTRIBUTING\.md)' | wc -l)
          impl_changed=$(echo "${{ steps.changed.outputs.changed_files }}" \
            | grep -E '^agents/_impl/' | wc -l)
          if [ "$impl_changed" -gt 0 ] && [ "$docs_changed" -eq 0 ]; then
            echo "::warning file=docs/STATUS.md::You changed agents/_impl/ but did not touch docs/. Please update docs/STATUS.md (and ARCHITECTURE.md if the contract changed)."
          fi
